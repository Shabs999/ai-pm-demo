    push('issues','issue','title');
    push('dependencies','dependency','title');
    push('requirements','requirement','title');
    push('decisions','decision','summary');
    push('openQuestions','question','question');
    (state.requirements||[]).forEach(function(r){ (r.scenarios||[]).forEach(function(sc){
      out.push({kind:'scenario', id:sc.id, title:sc.title, item:sc, sources:sc.sources||[], history:sc.history||[]}); }); });
    return out;
  }

  function fDeriveChanges(state, range, nowMs){
    var artMap=fArtMap(state), maxDate=fMaxDigestDate(state);
    function inR(stamp){ return fStampInRange(stamp, range, nowMs, maxDate); }
    function srcInR(id){ var a=artMap[id]; return a ? inR(a.digestedAt) : false; }
    var ents=fEntities(state), news=[], changes=[], resolved=[];
    ents.forEach(function(e){ var earliest=fEarliest(e.sources, artMap); if(earliest && inR(earliest)) news.push(e); });
    ents.forEach(function(e){
      (e.history||[]).forEach(function(h){
        if(!h || !h.source || !srcInR(h.source)) return;
        if(e.kind==='question' && h.field==='status') return;
        if(e.kind==='action' && h.field==='status' && e.item.status==='done') return;
        var field=h.field, now=e.item ? e.item[field] : undefined;
        var dateField=(field==='due' || field==='neededBy' || field==='date');
        var wasV=dateField ? fFmtDate(h.old) : (h.old==null ? "—" : String(h.old));
        var nowV=dateField ? fFmtDate(now) : (now==null ? "—" : String(now));
        changes.push({kind:e.kind, id:e.id, title:e.title, sources:e.sources, field:field, was:wasV, now:nowV});
      });
    });
    (state.openQuestions||[]).forEach(function(q){
      if(q.status!=='answered') return;
      var hit=(q.history||[]).some(function(h){ return h.field==='status' && srcInR(h.source); });
      if(!hit) hit=(q.sources||[]).some(srcInR);
      if(hit) resolved.push({kind:'question', id:q.id, title:q.question, sources:q.sources||[], note:'answered'});
    });
    (state.actions||[]).forEach(function(a){
      if(a.status!=='done') return;
      if((a.history||[]).some(function(h){ return h.field==='status' && srcInR(h.source); }))
        resolved.push({kind:'action', id:a.id, title:a.title, sources:a.sources||[], note:'done'});
    });
    (state.conflicts||[]).forEach(function(c){
      if(c.status==='open') return;
      var srcs=[c.sourceOld, c.sourceNew].filter(Boolean);
      if(srcs.some(srcInR)) resolved.push({kind:'conflict', id:c.id, title:c.about, sources:srcs, note:c.status});
    });
    return {news:news, changes:changes, resolved:resolved};
  }

  function fWcItem(kind, title, sources, extra){
    var srcs=(sources||[]).join(" ");
    return '<div class="wc-item prov" tabindex="0"' + (srcs ? ' data-sources="'+fEsc(srcs)+'"' : '') + '>' +
      '<span class="wc-chip">' + fEsc(kind) + '</span>' +
      '<div class="wc-body"><span class="wc-title">' + fEsc(title) + '</span>' + (extra||'') + '</div></div>';
  }
  function fRenderWhatChanged(state, range, nowMs){
    var d=fDeriveChanges(state, range, nowMs);
    function group(name, arr, render){
      if(!arr.length) return '';
      return '<div class="wc-group"><h3 class="wc-h">' + name + '<span class="count">' + arr.length + '</span></h3>' +
        arr.map(render).join('') + '</div>';
    }
    var newH=group('New', d.news, function(e){ return fWcItem(e.kind, e.title, e.sources, ''); });
    var chgH=group('Changed', d.changes, function(c){
      var ex='<div class="wc-change"><span class="wc-field">' + fEsc(c.field) + '</span>' +
        '<span class="wc-was">' + fEsc(c.was) + '</span><span class="wc-arrow" aria-hidden="true">→</span>' +
        '<span class="wc-now">' + fEsc(c.now) + '</span></div>';
      return fWcItem(c.kind, c.title, c.sources, ex);
    });
    var resH=group('Resolved', d.resolved, function(r){
      var ex=r.note ? '<span class="wc-note">' + fEsc(r.note) + '</span>' : '';
      return fWcItem(r.kind, r.title, r.sources, ex);
    });
    var body=newH + chgH + resH;
    if(!body) body='<p class="wc-empty">Nothing changed in this range.</p>';
    return body;
  }

  function fSlug(s){ return String(s||'feature').toLowerCase().replace(/[^a-z0-9]+/g,'-')
    .replace(/^-+|-+$/g,'').slice(0,50) || 'feature'; }
  function fGherkin(req){
    var lines=['Feature: ' + (req.title||'Untitled')];
    if(req.detail){ String(req.detail).split(/\n/).forEach(function(l){ lines.push('  ' + l); }); }
    (req.scenarios||[]).forEach(function(sc){
      lines.push('');
      if((sc.status||'draft')==='draft') lines.push('  @draft');
      lines.push('  Scenario: ' + (sc.title||'Untitled'));
      function steps(kw, arr){ var first=true; (arr||[]).forEach(function(c){
        lines.push('    ' + (first?kw:'And') + ' ' + c); first=false; }); }
      steps('Given', sc.given); steps('When', sc.when); steps('Then', sc.then);
    });
    return lines.join('\n') + '\n';
  }
  function fDownload(filename, text, mime){
    var a=document.createElement('a');
    a.href='data:' + (mime||'text/plain') + ';charset=utf-8,' + encodeURIComponent(text);
    a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  function fWireExport(state){
    var btn=document.getElementById('req-export-btn'), menu=document.getElementById('req-export-menu');
    if(!btn || !menu) return;
    var reqs=(state.requirements||[]).filter(function(r){ return (r.scenarios||[]).length; });
    var items=reqs.map(function(r,i){
      return '<button class="rx-item" type="button" data-idx="'+i+'">' + fEsc(r.title) +
        '<span class="rx-n">' + (r.scenarios||[]).length + '</span></button>'; }).join('');
    var allLabel='All (' + reqs.length + ' file' + (reqs.length===1?'':'s') + ')';
    menu.innerHTML=items + '<button class="rx-item rx-all" type="button" data-idx="all">' + fEsc(allLabel) + '</button>';
    function close(){ menu.hidden=true; btn.setAttribute('aria-expanded','false'); }
    function toggle(){ var willOpen=menu.hidden; menu.hidden=!willOpen; btn.setAttribute('aria-expanded', willOpen?'true':'false'); }
    btn.addEventListener('click', function(e){ e.stopPropagation(); toggle(); });
    menu.addEventListener('click', function(e){
      var t=e.target.closest('.rx-item'); if(!t) return;
      e.stopPropagation();
      var idx=t.getAttribute('data-idx');
      if(idx==='all'){ reqs.forEach(function(r,i){ setTimeout(function(){
        fDownload(fSlug(r.title)+'.feature', fGherkin(r), 'text/plain'); }, i*250); }); }
      else { var r=reqs[+idx]; if(r) fDownload(fSlug(r.title)+'.feature', fGherkin(r), 'text/plain'); }
      close();
    });
    document.addEventListener('click', function(e){
      if(!menu.hidden && !menu.contains(e.target) && e.target!==btn) close(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  }

  function fResolveOwner(state, id){
    if(!id) return 'Unassigned';
    var hit=(state.stakeholders||[]).filter(function(x){ return x.id===id; })[0];
    return hit ? hit.name : id;
  }
  function fHealth(state){
    var ms=state.milestones||[], raid=(state.risks||[]).concat(state.issues||[]), cf=state.conflicts||[];
    function live(x){ return x.status!=='resolved' && x.status!=='closed'; }
    if(ms.some(function(m){ return m.status==='late'; }) ||
       raid.some(function(x){ return x.severity==='critical' && live(x); })) return 'Off track';
    if(raid.some(function(x){ return x.severity==='high' && live(x); }) ||
       ms.some(function(m){ return m.status==='at-risk'; }) ||
       cf.some(function(c){ return c.status==='open'; })) return 'Needs attention';
    return 'On track';
  }
  function fNum(v){ return typeof v==='number' && isFinite(v); }
  function fKrScore(kr){
    if(fNum(kr.target) && fNum(kr.current)){
      var s=fNum(kr.start)?kr.start:0; if(kr.target===s) return null;
      var v=(kr.current-s)/(kr.target-s); if(v<0)v=0; if(v>1)v=1; return Math.round(v*100)/100;
    }
    return fNum(kr.score)?kr.score:null;
  }
  function fOkrRollup(o){ var xs=[]; (o.keyResults||[]).forEach(function(kr){ var v=fKrScore(kr); if(fNum(v)) xs.push(v); });
    if(!xs.length) return null; var t=0; xs.forEach(function(x){ t+=x; }); return t/xs.length; }
  function fIsoDate(d){ return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2); }
  function fReport(state, nowDate){
    var nowMs=nowDate.getTime(), iso=fIsoDate(nowDate), p=state.project||{}, L=[];
    L.push((p.name||'Project') + ' — status ' + fFmtDate(iso) + '   (' + fHealth(state) + ')');
    L.push('');
    var d=fDeriveChanges(state, 7, nowMs), cl=[];
    L.push('CHANGES THIS WEEK');
    d.news.slice(0,6).forEach(function(e){ cl.push('- NEW ' + e.kind + ': ' + e.title); });
    d.changes.slice(0,6).forEach(function(c){ cl.push('- ' + c.kind + ' ' + c.title + ' — ' + c.field + ': ' + c.was + ' -> ' + c.now); });
    d.resolved.slice(0,6).forEach(function(r){ cl.push('- RESOLVED ' + r.kind + ': ' + r.title); });
    if(!cl.length) cl.push('- (nothing recorded this week)');
    cl.forEach(function(x){ L.push(x); });
    L.push('');
    L.push('MILESTONES NEXT 4 WEEKS');
    var horizon=nowMs + 28*86400000;
    var mnext=(state.milestones||[]).filter(function(m){ var t=fStampMs(m.due);
      return isFinite(t) && t>=nowMs && t<=horizon && m.status!=='done'; })
      .sort(function(a,b){ return fStampMs(a.due) - fStampMs(b.due); });
    if(!mnext.length) L.push('- (none scheduled)');
    mnext.forEach(function(m){ L.push('- ' + m.title + ' — ' + fFmtDate(m.due) + ' — ' + m.status); });
    L.push('');
    L.push('OVERDUE ACTIONS');
    var od=(state.actions||[]).filter(function(a){ var t=fStampMs(a.due);
      return isFinite(t) && t<nowMs && (a.status==='open' || a.status==='in-progress'); })
      .sort(function(a,b){ return fStampMs(a.due) - fStampMs(b.due); });
    if(!od.length) L.push('- (none)');
    od.forEach(function(a){ L.push('- ' + a.title + ' — ' + fResolveOwner(state, a.owner) + ' — due ' + fFmtDate(a.due)); });
    L.push('');
    L.push('TOP RISKS');
    var risks=(state.risks||[]).filter(function(r){ return r.status==='open' || r.status==='mitigating'; })
      .sort(function(a,b){ var A=F_SEV_ORDER[a.severity], B=F_SEV_ORDER[b.severity];
        return (A==null?9:A) - (B==null?9:B); }).slice(0,3);
    if(!risks.length) L.push('- (none open)');
    risks.forEach(function(r){ L.push('- [' + r.severity + '] ' + r.title + ' — ' + r.status); });
    L.push('');
    L.push('NEEDS DECISION');
    var nd=[];
    (state.conflicts||[]).filter(function(c){ return c.status==='open'; }).forEach(function(c){
      nd.push('- conflict: ' + c.about + ' (' + c.was + ' -> ' + c.now + ')'); });
    (state.openQuestions||[]).filter(function(q){ return q.status==='open'; }).forEach(function(q){
      nd.push('- question: ' + q.question); });
    nd=nd.slice(0,3);
    if(!nd.length) nd.push('- (none)');
    nd.forEach(function(x){ L.push(x); });
    if((state.okrs||[]).length){
      L.push('');
      L.push('OKRs');
      (state.okrs||[]).forEach(function(o){
        var roll=fOkrRollup(o);
        L.push('- [' + (o.kind||'?') + '/' + (o.status||'?') + '] ' + o.objective + ' — rollup ' + (fNum(roll)?roll.toFixed(2):'—'));
      });
    }
    return L.join('\n') + '\n';
  }

  var fModal=null;
  function fCloseModal(){ if(fModal){ fModal.remove(); fModal=null; document.removeEventListener('keydown', fModalKey); } }
  function fModalKey(e){ if(e.key==='Escape') fCloseModal(); }
  function fCopyFallback(text, ok){
    var ta=document.createElement('textarea'); ta.value=text;
    ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); if(ok) ok(); }catch(e){}
    document.body.removeChild(ta);
  }
  function fCopy(text, btn){
    function ok(){ if(btn){ var o=btn.textContent; btn.textContent='Copied'; setTimeout(function(){ btn.textContent=o; }, 1200); } }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(ok, function(){ fCopyFallback(text, ok); });
    } else { fCopyFallback(text, ok); }
  }
  function fOpenReport(state, nowDate){
    fCloseModal();
    var text=fReport(state, nowDate), iso=fIsoDate(nowDate);

      '<div class="modal-head"><span class="modal-title">Status report</span>' +
      '<button class="modal-x" type="button" aria-label="Close">×</button></div>' +
      '<pre class="modal-pre"></pre>' +
      '<div class="modal-actions">' +
      '<button class="modal-btn" data-act="dl" type="button">Download .md</button>' +
      '<button class="modal-btn" data-act="copy" type="button">Copy</button></div></div>';
    fModal.querySelector('.modal-pre').textContent=text;
    document.body.appendChild(fModal);

    document.addEventListener('keydown', fModalKey);

  function wireFeatures(state, nowDate){

  var BA = { state:null, pristine:null, host:null, editing:false, dirty:false, idmap:null };

  function baEsc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;'}[c]; }); }
  var BA_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    if(!s) return "—";

  function baToday(){

  /* ---- id helpers ---- */
  function baAllIds(state){
    var ids = {};
    function add(o){ if(o && o.id) ids[o.id] = true; }
    var top = ["stakeholders","workstreams","milestones","actions","decisions","risks",
      "issues","dependencies","requirements","openQuestions","conflicts","artifacts","parkingLot"];
    top.forEach(function(k){ (state[k]||[]).forEach(add); });
    (state.requirements||[]).forEach(function(r){ (r.scenarios||[]).forEach(add); });
    (state.userStories||[]).forEach(function(us){
      add(us);
      (us.rules||[]).forEach(function(ru){ add(ru); (ru.examples||[]).forEach(add); });
      (us.scenarios||[]).forEach(add);

    (state.okrs||[]).forEach(function(o){ add(o); (o.keyResults||[]).forEach(add); });
    return ids;

  function baUid(prefix, title){
    var ids = baAllIds(BA.state);
    var base = prefix + (baSlug(title) || 'item');

    while(ids[base + '-' + n]) n++;
    return base + '-' + n;
  }
  function baBuildIdMap(){
    var map = {};

      "issues","dependencies","requirements","openQuestions","conflicts","artifacts","parkingLot"];
    top.forEach(function(k){ (BA.state[k]||[]).forEach(idx); });
    (BA.state.requirements||[]).forEach(function(r){ (r.scenarios||[]).forEach(idx); });
    (BA.state.userStories||[]).forEach(function(us){
      idx(us);
      (us.rules||[]).forEach(function(ru){ idx(ru); (ru.examples||[]).forEach(idx); });
      (us.scenarios||[]).forEach(idx);

    (BA.state.okrs||[]).forEach(function(o){ idx(o); (o.keyResults||[]).forEach(idx); });

  function baWsChip(state, wsId){
    if(!wsId && !BA.editing) return "";
    var ws = null; (state.workstreams||[]).forEach(function(w){ if(w.id===wsId) ws = w; });
    var color = baSafeColor((ws && ws.color) || "#898781");
    var name = ws ? ws.name : "—";
    return '<span class="chip"><span class="chip-dot" style="background:' + color + '"></span>' + baEsc(name) + '</span>';
  }
  function baNarrative(us){
    var n = us.narrative || {};
    if(BA.editing){
      return '<div class="us-narrative">' +
        '<span class="us-nk">As a</span> ' + baText("userStories", us.id, "narrative.asA", n.asA) +
        ' <span class="us-nk">I want</span> ' + baText("userStories", us.id, "narrative.iWant", n.iWant) +
        ' <span class="us-nk">so that</span> ' + baText("userStories", us.id, "narrative.soThat", n.soThat) + '</div>';
    }
    var parts = [];
    if(n.asA) parts.push('<span class="us-nk">As a</span> ' + baEsc(n.asA));
    if(n.iWant) parts.push('<span class="us-nk">I want</span> ' + baEsc(n.iWant));
    if(n.soThat) parts.push('<span class="us-nk">so that</span> ' + baEsc(n.soThat));
    if(!parts.length) return "";
    return '<div class="us-narrative">' + parts.join(' ') + '</div>';
  }
  function baExampleRow(ru, ex){
    function line(kw, coll, field, val){
      var body = BA.editing ? baText("examples", ex.id, field, val) : (val==null ? '<span class="ex-null">—</span>' : baEsc(val));
      return '<div class="ex-line"><span class="ex-kw">' + kw + '</span><span class="ex-clause">' + body + '</span></div>';
    }
    var del = BA.editing ? baDelBtn("examples", ex.id) : "";
    return '<div class="ex-row prov" tabindex="0" data-kind="ex" data-id="' + baEsc(ex.id) + '"' +
      ((ex.sources&&ex.sources.length)?' data-sources="' + baEsc(ex.sources.join(" ")) + '"':'') + '>' +
      '<div class="ex-title">' + baText("examples", ex.id, "title", ex.title) + del + '</div>' +
      line("Context", "examples", "context", ex.context) +
      line("Action", "examples", "action", ex.action) +
      line("Outcome", "examples", "outcome", ex.outcome) + '</div>';
  }
  function baRuleCard(us, ru){
    var exs = (ru.examples||[]).map(function(ex){ return baExampleRow(ru, ex); }).join('') ||
      (BA.editing ? '' : '<div class="ex-line"><span class="ex-clause ex-null">No examples yet.</span></div>');
    var del = BA.editing ? baDelBtn("rules", ru.id) : "";
    var add = BA.editing ? baAddBtn("example", ru.id, "+ Example") : "";
    return '<div class="rule prov" tabindex="0" data-kind="rule" data-id="' + baEsc(ru.id) + '"' +
      '>' +
      '<div class="rule-title">' + baText("rules", ru.id, "title", ru.title) + del + '</div>' +
      exs + add + '</div>';
  }
  function baScenario(sc){
    var st = sc.status || "draft";
    var rows = [];
    function add(keyword, field){
      var arr = sc[field] || [];
      if(BA.editing){
        for(var i=0;i<arr.length;i++){
          rows.push('<div class="gwt-row"><span class="gwt-kw">' + (i===0?keyword:"And") + '</span>' +
            '<span class="gwt-clause">' + baArrText(sc.id, field, i, arr[i]) +
            ' <button class="ba-del ba-del-sm" type="button" data-delclause="' + baEsc(sc.id) + '" data-df="' + field + '" data-di="' + i + '">&#215;</button></span></div>');
        }
        rows.push('<div class="gwt-row"><span class="gwt-kw"></span><span class="gwt-clause">' +
          '<button class="ba-add ba-add-sm" type="button" data-addclause="' + baEsc(sc.id) + '" data-df="' + field + '">+ ' + keyword + '</button></span></div>');
      } else {
        var first = true;
        arr.forEach(function(c){ rows.push('<div class="gwt-row"><span class="gwt-kw">' + (first?keyword:"And") + '</span>' +
          '<span class="gwt-clause">' + baEsc(c) + '</span></div>'); first = false; });
      }
    }
    add("Given","given"); add("When","when"); add("Then","then");
    var tag = BA.editing ? baEnumCtl("scenarios", sc.id, "status", "scenario.status", st)
      : '<span class="sc-tag sc-' + baEsc(st) + '">' + baEsc(BA_SC_STATUS[st] || st) + '</span>';
    var del = BA.editing ? baDelBtn("scenarios", sc.id) : "";
    return '<div class="sc prov" tabindex="0" data-kind="sc" data-id="' + baEsc(sc.id) + '"' +
      ((sc.sources&&sc.sources.length)?' data-sources="' + baEsc(sc.sources.join(" ")) + '"':'') + '>' +
      '<div class="sc-head"><span class="sc-title">' + baText("scenarios", sc.id, "title", sc.title) + '</span>' +
      '<span class="sc-head-right">' + tag + del + '</span></div>' +
      '<div class="gwt">' + rows.join('') + '</div></div>';
  }
  function baRedCards(us){
    var qs = (BA.state.openQuestions||[]).filter(function(q){ return q.storyRef === us.id; });
    if(!qs.length) return "";
    var items = qs.map(function(q){
      return '<div class="redcard prov" tabindex="0" data-kind="oq" data-id="' + baEsc(q.id) + '"' +
        ((q.sources&&q.sources.length)?' data-sources="' + baEsc(q.sources.join(" ")) + '"':'') + '>' +
        '<span class="redcard-icon" aria-hidden="true">&#10067;</span>' +
        '<span class="redcard-q">' + baText("openQuestions", q.id, "question", q.question) + '</span></div>';
    }).join('');
    return '<div class="us-redcards">' + items + '</div>';
  }
  function baStoryCard(us){
    var rules = (us.rules||[]).map(function(ru){ return baRuleCard(us, ru); }).join('');
    var addRule = BA.editing ? baAddBtn("rule", us.id, "+ Rule") : "";
    var scen = (us.scenarios||[]).map(baScenario).join('');
    var addSc = BA.editing ? baAddBtn("scenario", us.id, "+ Scenario") : "";
    var del = BA.editing ? baDelBtn("userStories", us.id) : "";
    var rulesBlock = (rules || BA.editing) ? ('<div class="us-sub-h">Rules &amp; examples</div><div class="us-rules">' + rules + addRule + '</div>') : "";
    var scBlock = (scen || BA.editing) ? ('<div class="us-sub-h">Formulated scenarios</div><div class="us-sc-list">' + scen + addSc + '</div>') : "";
    return '<div class="us prov" tabindex="0" data-kind="us" data-id="' + baEsc(us.id) + '"' +
      ((us.sources&&us.sources.length)?' data-sources="' + baEsc(us.sources.join(" ")) + '"':'') + '>' +
      '<div class="us-head"><span class="us-title">' + baText("userStories", us.id, "title", us.title) + '</span>' +
      '<span class="us-head-right">' + baStoryTag(us) + del + '</span></div>' +
      baNarrative(us) +
      '<div class="us-ws">' + baWsChip(BA.state, us.workstream) + '</div>' +
      rulesBlock + scBlock + baRedCards(us) + '</div>';
  }
  function baStoriesBody(){
    var stories = BA.state.userStories || [];
    if(!stories.length && !BA.editing) return "";
    var html = stories.map(baStoryCard).join('');
    if(BA.editing) html += baAddBtn("userStories", null, "+ Story");
    return html || '<p class="empty">No user stories yet.</p>';
  }

  /* ====================== RTM + UAT (derived) ====================== */
  function baRTMBody(){
    var stories = BA.state.userStories || [];
    var bar = '<div class="rtm-bar">' +
      '<button class="rx-btn" type="button" id="ba-rtm-csv">Export RTM (CSV)</button>' +
      '<button class="rx-btn" type="button" id="ba-uat-csv">Export UAT (CSV)</button>' +
      '<button class="rx-btn" type="button" id="ba-uat-md">Export UAT (MD)</button></div>';
    if(!stories.length) return bar + '<p class="empty">No user stories to trace yet.</p>';
    var rows = "";
    stories.forEach(function(us){
      var rules = us.rules || [];
      var scen = (us.scenarios||[]).map(function(s){ return '<span class="rtm-chip">' + baEsc(s.id) + '</span>'; }).join('') || '<span class="ex-null">—</span>';
      var srcs = (us.sources||[]).join(", ") || "—";
      var span = Math.max(rules.length, 1);
      var storyCell = '<td rowspan="' + span + '"><div class="rtm-story">' + baEsc(us.title) + '</div>' +
        '<div class="rtm-sub">' + baEsc(us.id) + '</div></td>';
      var scCell = '<td rowspan="' + span + '">' + scen + '</td>';
      var stCell = '<td rowspan="' + span + '"><span class="us-tag us-' + baEsc(us.status||'draft') + '">' +
        baEsc(BA_STORY_TAG[us.status||'draft'] || us.status) + '</span></td>';
      var srcCell = '<td rowspan="' + span + '" class="rtm-src">' + baEsc(srcs) + '</td>';
      if(!rules.length){
        rows += '<tr>' + storyCell + '<td class="ex-null">—</td><td class="num">0</td>' + scCell + stCell + srcCell + '</tr>';
      } else {
        rules.forEach(function(ru, i){
          rows += '<tr>' + (i===0 ? storyCell : '') +
            '<td>' + baEsc(ru.title) + '</td>' +
            '<td class="num">' + (ru.examples||[]).length + '</td>' +
            (i===0 ? scCell + stCell + srcCell : '') + '</tr>';
        });
      }
    });
    return bar + '<div style="overflow-x:auto"><table class="rtm-table"><thead><tr>' +
      '<th>Story</th><th>Rule</th><th class="num">Examples</th><th>Scenarios</th><th>Status</th><th>Sources</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function baCsvField(v){ var s = String(v==null?"":v); if(/^[=+\-@\t\r]/.test(s)) s = "'" + s; return '"' + s.replace(/"/g,'""') + '"'; }
  function baCsv(rows){
    return "﻿" + rows.map(function(r){ return r.map(baCsvField).join(","); }).join("\r\n") + "\r\n";
  }
  function baDownload(filename, text, mime){
    var a = document.createElement('a');
    a.href = 'data:' + (mime||'text/plain') + ';charset=utf-8,' + encodeURIComponent(text);
    a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  function baPid(){ return (BA.state.project && BA.state.project.id) || 'project'; }

  function baExportRTM(){
    var rows = [["Story ID","Story","Rule","Examples","Scenario IDs","Status","Sources"]];
    (BA.state.userStories||[]).forEach(function(us){
      var scIds = (us.scenarios||[]).map(function(s){ return s.id; }).join(" ");
      var srcs = (us.sources||[]).join(" ");
      var rules = us.rules || [];
      if(!rules.length){
        rows.push([us.id, us.title, "", 0, scIds, us.status||"", srcs]);
      } else {
        rules.forEach(function(ru){
          rows.push([us.id, us.title, ru.title, (ru.examples||[]).length, scIds, us.status||"", srcs]);
        });
      }
    });
    baDownload(baPid() + "-rtm.csv", baCsv(rows), "text/csv");
  }

  function baUatCases(){
    var cases = [];
    function join(a){ return (a||[]).join("; "); }
    (BA.state.userStories||[]).forEach(function(us){
      (us.scenarios||[]).forEach(function(sc){
        cases.push({ caseId: sc.id, group: us.title, groupId: us.id, groupKind: "Story",
          title: sc.title, pre: join(sc.given), steps: join(sc.when), expect: join(sc.then),
          status: sc.status||"draft" });
      });
    });
    (BA.state.requirements||[]).forEach(function(r){
      (r.scenarios||[]).forEach(function(sc){
        cases.push({ caseId: sc.id, group: r.title, groupId: r.id, groupKind: "Requirement",
          title: sc.title, pre: join(sc.given), steps: join(sc.when), expect: join(sc.then),
          status: sc.status||"draft" });
      });
    });
    return cases;
  }
  function baExportUatCsv(){
    var rows = [["Case ID","Type","Story / Requirement","Test title","Preconditions","Steps","Expected","Status"]];
    baUatCases().forEach(function(c){
      rows.push([c.caseId, c.groupKind, c.group, c.title, c.pre, c.steps, c.expect, c.status]);
    });
    baDownload(baPid() + "-uat.csv", baCsv(rows), "text/csv");
  }
  function baExportUatMd(){
    var cases = baUatCases();
    var p = BA.state.project || {};
    var L = ["# UAT script — " + (p.name || "Project"), "", "_Generated " + baFmtDate(baToday()) +
      " · " + cases.length + " test case" + (cases.length===1?"":"s") + " · derived from scenarios (not stored)._", ""];
    var groups = [], seen = {};
    cases.forEach(function(c){ var k = c.groupKind + "::" + c.groupId;
      if(!seen[k]){ seen[k] = { kind:c.groupKind, name:c.group, id:c.groupId, items:[] }; groups.push(seen[k]); }
      seen[k].items.push(c); });
    groups.forEach(function(g){
      L.push("## " + g.name + "  \n_" + g.kind + " · " + g.id + "_", "");
      g.items.forEach(function(c){
        L.push("### " + c.caseId + " — " + c.title);
        L.push("- **Status:** " + c.status);
        L.push("- **Preconditions:** " + (c.pre || "—"));
        L.push("- **Steps:** " + (c.steps || "—"));
        L.push("- **Expected:** " + (c.expect || "—"));
        L.push("");
      });
    });
    if(!cases.length) L.push("_No scenarios to derive UAT cases from yet._");
    baDownload(baPid() + "-uat.md", L.join("\n") + "\n", "text/markdown");
  }

  /* ====================== OKRs (read + edit) ====================== */
  var BA_OKR_KIND = { committed:"Committed", aspirational:"Aspirational" };
  var BA_OKR_STATUS = { draft:"Draft", active:"Active", closed:"Closed" };
  var BA_KR_CONF = { low:"Low", medium:"Medium", high:"High" };

  function baNum(v){ return typeof v==='number' && isFinite(v); }
  function baKrHasNums(kr){ return baNum(kr.target) && baNum(kr.current); }
  function baKrDerive(kr){
    if(!baKrHasNums(kr)) return null;
    var s = baNum(kr.start) ? kr.start : 0;
    if(kr.target === s) return null;
    var v = (kr.current - s) / (kr.target - s);
    if(v < 0) v = 0; if(v > 1) v = 1;
    return Math.round(v * 100) / 100;
  }
  function baKrScore(kr){
    if(baKrHasNums(kr)) return baKrDerive(kr);
    return baNum(kr.score) ? kr.score : null;
  }
  function baOkrRollup(o){
    var xs = [];
    (o.keyResults||[]).forEach(function(kr){ var v = baKrScore(kr); if(baNum(v)) xs.push(v); });
    if(!xs.length) return null;
    var t = 0; xs.forEach(function(x){ t += x; }); return t / xs.length;
  }
  function baKrColor(kind, score){
    if(!baNum(score)) return "okr-none";
    if(kind === 'committed'){ if(score >= 0.9) return "okr-good"; if(score >= 0.7) return "okr-amber"; return "okr-bad"; }
    if(score >= 0.7) return "okr-good"; if(score >= 0.4) return "okr-amber"; return "okr-bad";
  }
  function baFmtNum(v){ return baNum(v) ? String(Math.round(v * 100) / 100) : "—"; }
  function baMsById(id){ var hit=null; (BA.state.milestones||[]).forEach(function(m){ if(m.id===id) hit=m; }); return hit; }
  function baStkName(id){ if(!id) return null; var hit=null; (BA.state.stakeholders||[]).forEach(function(s){ if(s.id===id) hit=s; }); return hit?hit.name:id; }
  function baWsName(id){ if(!id) return ""; var hit=""; (BA.state.workstreams||[]).forEach(function(w){ if(w.id===id) hit=w.name; }); return hit; }

  function baKrRow(o, kr){
    var kind = o.kind || "committed";
    var score = baKrScore(kr);
    var col = baKrColor(kind, score);
    var pct = baNum(score) ? Math.round(score * 100) : 0;
    var scoreTxt = baNum(score) ? score.toFixed(2) : "—";
    var scoreCell;
    if(BA.editing && !baKrHasNums(kr)) scoreCell = baNumCtl("keyResults", kr.id, "score", kr.score, "0-1");
    else if(BA.editing) scoreCell = '<span class="kr-score-auto" title="Auto-derived from start / target / current">' + scoreTxt + ' <span class="kr-auto">auto</span></span>';
    else scoreCell = scoreTxt;
    var bar = '<div class="kr-bar" role="img" aria-label="Score ' + scoreTxt + ' of 1.00">' +
      '<div class="kr-bar-fill ' + col + '" style="width:' + pct + '%"></div></div>';
    var nums;
    if(BA.editing){
      nums = '<span class="kr-nums num"><span class="kr-nk">start</span> ' + baNumCtl("keyResults", kr.id, "start", kr.start, "—") +
        ' <span class="kr-nk">cur</span> ' + baNumCtl("keyResults", kr.id, "current", kr.current, "—") +
        ' <span class="kr-nk">target</span> ' + baNumCtl("keyResults", kr.id, "target", kr.target, "—") +
        ' <span class="kr-nk">unit</span> ' + baText("keyResults", kr.id, "unit", kr.unit) + '</span>';
    } else {
      var hasCT = baNum(kr.current) || baNum(kr.target);
      nums = hasCT ? ('<span class="kr-nums num">' + baFmtNum(kr.current) + ' / ' + baFmtNum(kr.target) +
        (kr.unit ? (' ' + baEsc(kr.unit)) : '') + '</span>') : '<span class="kr-nums kr-unquant">not quantified</span>';
    }
    var conf = kr.confidence;
    var confCell = BA.editing ? ('<span class="kr-conf">' + baEnumCtl("keyResults", kr.id, "confidence", "kr.confidence", conf) + '</span>')
      : (conf ? ('<span class="kr-conf" title="Confidence"><span class="kr-dot kr-dot-' + baEsc(conf) + '"></span>' + baEsc(BA_KR_CONF[conf]||conf) + '</span>') : '');
    var msRef = kr.milestoneRef, msCell = '';
    if(BA.editing){
      msCell = '<span class="kr-ms"><span class="kr-nk">milestone</span> ' + baText("keyResults", kr.id, "milestoneRef", msRef) + '</span>';
    } else if(msRef){
      var m = baMsById(msRef), mt = m ? m.title : msRef;
      var msrc = (m && m.sources && m.sources.length) ? (' data-sources="' + baEsc(m.sources.join(" ")) + '"') : '';
      msCell = '<span class="kr-ms prov" tabindex="0" data-kind="ms-ref" data-id="' + baEsc(msRef) + '"' + msrc + '>' +
        '<span class="kr-ms-ic" aria-hidden="true">&#9670;</span>' + baEsc(mt) + '</span>';
    }
    var del = BA.editing ? baDelBtn("keyResults", kr.id) : "";
    return '<div class="kr prov" tabindex="0" data-kind="kr" data-id="' + baEsc(kr.id) + '"' +
      ((kr.sources&&kr.sources.length)?' data-sources="' + baEsc(kr.sources.join(" ")) + '"':'') + '>' +
      '<div class="kr-top"><span class="kr-stmt">' + baText("keyResults", kr.id, "statement", kr.statement) + '</span>' +
      '<span class="kr-score num ' + col + '-ink">' + scoreCell + '</span>' + del + '</div>' +
      bar +
      '<div class="kr-metrics">' + nums + confCell + msCell + '</div></div>';
  }

  function baOkrCard(o){
    var kind = o.kind || "committed";
    var roll = baOkrRollup(o);
    var rollCol = baKrColor(kind, roll);
    var rollTxt = baNum(roll) ? roll.toFixed(2) : "—";
    var kindChip = BA.editing ? baEnumCtl("okrs", o.id, "kind", "okr.kind", kind)
      : '<span class="okr-kind okr-kind-' + baEsc(kind) + '">' + baEsc(BA_OKR_KIND[kind]||kind) + '</span>';
    var statusTag = BA.editing ? baEnumCtl("okrs", o.id, "status", "okr.status", o.status||"draft")
      : '<span class="okr-status okr-st-' + baEsc(o.status||"draft") + '">' + baEsc(BA_OKR_STATUS[o.status||"draft"]||o.status) + '</span>';
    var period = BA.editing ? ('<span class="okr-period"><span class="okr-mk">period</span> ' + baText("okrs", o.id, "period", o.period) + '</span>')
      : (o.period ? ('<span class="okr-period">' + baEsc(o.period) + '</span>') : '');
    var owner = BA.editing ? ('<span class="okr-owner"><span class="okr-mk">owner</span> ' + baText("okrs", o.id, "owner", o.owner) + '</span>')
      : (o.owner ? ('<span class="okr-owner"><span class="okr-mk">owner</span> ' + baEsc(baStkName(o.owner)) + '</span>') : '');
    var wsChip = BA.editing ? ('<span class="okr-ws"><span class="okr-mk">ws</span> ' + baText("okrs", o.id, "workstream", o.workstream) + '</span>')
      : (o.workstream ? ('<span class="okr-ws">' + baWsChip(BA.state, o.workstream) + '</span>') : '');
    var krs = (o.keyResults||[]).map(function(kr){ return baKrRow(o, kr); }).join('') ||
      (BA.editing ? '' : '<div class="kr-empty">No key results yet.</div>');
    var addKr = BA.editing ? baAddBtn("keyResult", o.id, "+ Key result") : "";
    var del = BA.editing ? baDelBtn("okrs", o.id) : "";
    var gauge = '<span class="okr-rollup ' + rollCol + '" title="Objective rollup — mean of key-result scores">' +
      '<span class="okr-rollup-n num">' + rollTxt + '</span><span class="okr-rollup-l">rollup</span></span>';
    return '<div class="okr prov" tabindex="0" data-kind="okr" data-id="' + baEsc(o.id) + '"' +
      ' data-okr-status="' + baEsc(o.status||"draft") + '" data-okr-kind="' + baEsc(kind) + '"' +
      ' data-okr-rollup="' + (baNum(roll)?roll:"") + '"' +
      ((o.sources&&o.sources.length)?' data-sources="' + baEsc(o.sources.join(" ")) + '"':'') + '>' +
      '<div class="okr-head"><div class="okr-obj">' + baText("okrs", o.id, "objective", o.objective) + '</div>' +
      '<div class="okr-head-right">' + gauge + del + '</div></div>' +
      '<div class="okr-meta">' + kindChip + statusTag + period + owner + wsChip + '</div>' +
      '<div class="okr-krs">' + krs + addKr + '</div></div>';
  }

  function baOkrsBody(){
    var okrs = BA.state.okrs || [];
    if(!okrs.length && !BA.editing) return "";
    var bar = '<div class="rtm-bar"><button class="rx-btn" type="button" id="ba-okr-csv">Export OKRs (CSV)</button></div>';
    var html = okrs.map(baOkrCard).join('');
    if(BA.editing) html += baAddBtn("okrs", null, "+ Objective");
    return bar + (html || '<p class="empty">No OKRs yet.</p>');
  }

  function baExportOKRs(){
    var rows = [["Objective ID","Objective","Period","Kind","Status","Owner","Workstream","Rollup",
      "KR ID","Key result","Metric","Start","Target","Current","Unit","Score","Confidence","Milestone"]];
    (BA.state.okrs||[]).forEach(function(o){
      var roll = baOkrRollup(o), rollTxt = baNum(roll)?roll.toFixed(2):"";
      var own = o.owner ? baStkName(o.owner) : "", wsn = baWsName(o.workstream);
      var krs = o.keyResults || [];
      if(!krs.length){
        rows.push([o.id, o.objective, o.period||"", o.kind||"", o.status||"", own, wsn, rollTxt, "", "", "", "", "", "", "", "", "", ""]);
      } else {
        krs.forEach(function(kr){
          var sc = baKrScore(kr), m = baMsById(kr.milestoneRef), mt = m ? m.title : (kr.milestoneRef||"");
          rows.push([o.id, o.objective, o.period||"", o.kind||"", o.status||"", own, wsn, rollTxt,
            kr.id, kr.statement, kr.metric||"", baNum(kr.start)?kr.start:"", baNum(kr.target)?kr.target:"",
            baNum(kr.current)?kr.current:"", kr.unit||"", baNum(sc)?sc:"", kr.confidence||"", mt]);
        });
      }
    });
    baDownload(baPid() + "-okrs.csv", baCsv(rows), "text/csv");
  }

  /* ====================== validation (port, incl. userStories) ====================== */
  function baValidate(state){
    var errors = [], DATE = /^\d{4}-\d{2}-\d{2}$/;
    function isObj(o){ return o!==null && typeof o==='object' && !Array.isArray(o); }
    function need(o, f, w){ if(!isObj(o) || o[f]==null || o[f]==="") errors.push(w + ": missing required '" + f + "'"); }
    function enun(o, f, key, w, an){ if(!isObj(o) || !(f in o)) return; var v=o[f];
      if((v==null) && an) return; if((BA_ENUMS[key]||[]).indexOf(v)===-1) errors.push(w + ": '" + f + "'=" + JSON.stringify(v) + " invalid"); }
    function date(o, f, w){ if(!isObj(o)) return; var v=o[f]; if(v==null) return;
      if(typeof v!=='string' || !DATE.test(v)) errors.push(w + ": '" + f + "'=" + JSON.stringify(v) + " not YYYY-MM-DD"); }
    var ids = {}, artIds = {};
    var top = ["stakeholders","workstreams","milestones","actions","decisions","risks","issues",
      "dependencies","requirements","openQuestions","conflicts","artifacts","parkingLot"];
    function reg(coll){ (state[coll]||[]).forEach(function(it, i){ if(!isObj(it)){ errors.push(coll+"["+i+"] not object"); return; }
      if(!it.id){ errors.push(coll+"["+i+"] missing id"); return; }
      if(it.id in ids) errors.push("duplicate id '" + it.id + "'"); else ids[it.id] = coll; }); }
    top.forEach(reg);
    (state.artifacts||[]).forEach(function(a){ if(isObj(a) && a.id) artIds[a.id] = true; });
    function src(it, w){ var s = it.sources; if(s==null) return; if(!Array.isArray(s)){ errors.push(w+": sources not array"); return; }
      s.forEach(function(x){ if(!(x in artIds)) errors.push(w + ": source '" + x + "' unknown"); }); }
    (state.milestones||[]).forEach(function(it,i){ var w="milestones["+i+"]"; need(it,"title",w); need(it,"status",w); enun(it,"status","milestone.status",w); date(it,"due",w); if(isObj(it)) src(it,w); });
    (state.actions||[]).forEach(function(it,i){ var w="actions["+i+"]"; need(it,"title",w); need(it,"status",w); enun(it,"status","action.status",w); date(it,"due",w); if(isObj(it)) src(it,w); });
    (state.decisions||[]).forEach(function(it,i){ var w="decisions["+i+"]"; need(it,"summary",w); date(it,"date",w); if(isObj(it)) src(it,w); });
    (state.risks||[]).forEach(function(it,i){ var w="risks["+i+"]"; need(it,"title",w); enun(it,"severity","risk.severity",w); enun(it,"likelihood","risk.likelihood",w,true); enun(it,"status","risk.status",w); if(isObj(it)) src(it,w); });
    (state.issues||[]).forEach(function(it,i){ var w="issues["+i+"]"; need(it,"title",w); enun(it,"severity","issue.severity",w); enun(it,"status","issue.status",w); if(isObj(it)) src(it,w); });
    (state.dependencies||[]).forEach(function(it,i){ var w="dependencies["+i+"]"; need(it,"title",w); enun(it,"status","dependency.status",w); date(it,"neededBy",w); if(isObj(it)) src(it,w); });
    (state.requirements||[]).forEach(function(it,i){ var w="requirements["+i+"]"; need(it,"title",w); enun(it,"kind","requirement.kind",w); enun(it,"status","requirement.status",w); if(isObj(it)) src(it,w);
      (it.scenarios||[]).forEach(function(sc,j){ var sw=w+".scenarios["+j+"]"; need(sc,"title",sw); enun(sc,"status","scenario.status",sw); if(isObj(sc)) src(sc,sw);
        if(sc.id){ if(sc.id in ids) errors.push("duplicate id '" + sc.id + "'"); else ids[sc.id]="scenarios"; } }); });
    (state.openQuestions||[]).forEach(function(it,i){ var w="openQuestions["+i+"]"; need(it,"question",w); enun(it,"status","question.status",w); date(it,"date",w); if(isObj(it)) src(it,w); });
    (state.parkingLot||[]).forEach(function(it,i){ var w="parkingLot["+i+"]"; need(it,"note",w); date(it,"date",w); if(isObj(it)) src(it,w); });
    (state.userStories||[]).forEach(function(us,i){ var w="userStories["+i+"]"; if(!isObj(us)){ errors.push(w+" not object"); return; }
      need(us,"title",w); enun(us,"status","story.status",w); if(isObj(us)) src(us,w);
      if(us.id){ if(us.id in ids) errors.push("duplicate id '" + us.id + "'"); else ids[us.id]="userStories"; }
      var ws = us.workstream; if(ws!=null && !(ws in ids)) errors.push(w+": workstream '" + ws + "' unknown");
      (us.rules||[]).forEach(function(ru,r){ var rw=w+".rules["+r+"]"; need(ru,"title",rw);
        if(ru.id){ if(ru.id in ids) errors.push("duplicate id '" + ru.id + "'"); else ids[ru.id]="rules"; }
        (ru.examples||[]).forEach(function(ex,e){ var ew=rw+".examples["+e+"]"; need(ex,"title",ew);
          if(ex.id){ if(ex.id in ids) errors.push("duplicate id '" + ex.id + "'"); else ids[ex.id]="examples"; } }); });
      (us.scenarios||[]).forEach(function(sc,j){ var sw=w+".scenarios["+j+"]"; need(sc,"title",sw); enun(sc,"status","scenario.status",sw); if(isObj(sc)) src(sc,sw);
        if(sc.id){ if(sc.id in ids) errors.push("duplicate id '" + sc.id + "'"); else ids[sc.id]="scenarios"; } }); });
    (state.openQuestions||[]).forEach(function(q,i){ var ref=isObj(q)?q.storyRef:null;
      if(ref!=null && ids[ref]!=="userStories") errors.push("openQuestions["+i+"]: storyRef '" + ref + "' not a user story"); });
    (state.okrs||[]).forEach(function(o,i){ var w="okrs["+i+"]"; if(!isObj(o)){ errors.push(w+" not object"); return; }
      need(o,"objective",w); enun(o,"status","okr.status",w); enun(o,"kind","okr.kind",w); src(o,w);
      if(o.id){ if(o.id in ids) errors.push("duplicate id '" + o.id + "'"); else ids[o.id]="okrs"; }
      if(o.owner!=null && ids[o.owner]!=="stakeholders") errors.push(w+": owner '" + o.owner + "' not a stakeholder");
      if(o.workstream!=null && ids[o.workstream]!=="workstreams") errors.push(w+": workstream '" + o.workstream + "' not a workstream");
      (o.keyResults||[]).forEach(function(kr,j){ var kw=w+".keyResults["+j+"]"; if(!isObj(kr)){ errors.push(kw+" not object"); return; }
        need(kr,"statement",kw); enun(kr,"confidence","kr.confidence",kw,true); src(kr,kw);
        var sc=kr.score; if(sc!=null && !(typeof sc==='number' && sc>=0 && sc<=1)) errors.push(kw+": score "+JSON.stringify(sc)+" not in [0,1]");
        if(kr.milestoneRef!=null && ids[kr.milestoneRef]!=="milestones") errors.push(kw+": milestoneRef '" + kr.milestoneRef + "' not a milestone");
        if(kr.id){ if(kr.id in ids) errors.push("duplicate id '" + kr.id + "'"); else ids[kr.id]="keyResults"; } }); });
    return errors;
  }

  /* ====================== edit toolbar + lifecycle ====================== */

      (errors.length>12 ? '<li>… ' + (errors.length-12) + ' more</li>' : '') + '</ul>';

  function baClearBanner(){ var b = document.getElementById('ba-banner'); if(b) b.remove(); }
  function baToast(msg){
    var t = document.createElement('div'); t.className = 'ba-toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.classList.add('show'); }, 10);
    setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ if(t.parentNode) t.remove(); }, 300); }, 2600);

  function baSetTools(){
    var btn = document.getElementById('ba-edit-btn');
    if(!btn) return;
    var cluster = document.getElementById('ba-edit-cluster');
    if(BA.editing){
      btn.style.display = 'none';
      if(!cluster){
        cluster = document.createElement('span');
        cluster.id = 'ba-edit-cluster';
        cluster.className = 'ba-edit-cluster';
        cluster.innerHTML = '<span class="ba-edit-label">Editing</span>' +
          '<button class="ba-save" id="ba-save-btn" type="button">Save</button>' +
          '<button class="ba-discard" id="ba-discard-btn" type="button">Discard</button>';
        btn.parentNode.insertBefore(cluster, btn.nextSibling);
        document.getElementById('ba-save-btn').addEventListener('click', function(e){ e.stopPropagation(); baSave(); });
        document.getElementById('ba-discard-btn').addEventListener('click', function(e){ e.stopPropagation(); baDiscardRequest(); });
      }
    } else {
      btn.style.display = '';

  function baEnterEdit(){
    if(BA.editing) return;
    BA.editing = true; BA.dirty = false;

  function baDiscardRequest(){
    // leaving edit mode without saving: inline confirm (never window.confirm)
    if(!BA.dirty){ baDiscard(); return; }
    var cluster = document.getElementById('ba-edit-cluster');
    if(!cluster || cluster.querySelector('.ba-discard-confirm')){ return; }
    var d = document.getElementById('ba-discard-btn'); if(d) d.style.display = 'none';
    var span = document.createElement('span');
    span.className = 'ba-discard-confirm';
    span.innerHTML = '<span class="ba-confirm-q">Discard changes?</span>' +
      '<button class="ba-cy" type="button" id="ba-discard-yes">Discard</button>' +
      '<button class="ba-cn" type="button" id="ba-discard-no">Keep editing</button>';
    cluster.appendChild(span);
    document.getElementById('ba-discard-yes').addEventListener('click', function(e){ e.stopPropagation(); baDiscard(); });
    document.getElementById('ba-discard-no').addEventListener('click', function(e){ e.stopPropagation(); span.remove(); if(d) d.style.display = ''; });
  }
  function baDiscard(){
    baExitEditVisual();
    if(BA.host.discard){ BA.host.discard(baClone(BA.pristine)); return; }
    // default (render.py static): reload restores the embedded pristine state
    location.reload();
  }
  function baApplyReadonly(){
    // render.py fallback: convert decorated legacy items to read-only in place,
    // drop new-row markers, and repaint BA sections.
    baBuildIdMap();
    document.querySelectorAll('[data-eitem]').forEach(function(el){
      var id = el.getAttribute('data-id'), obj = baFind(id);
      if(!obj){ el.remove(); return; }
      el.classList.remove('ba-newrow');
      el.querySelectorAll('.ba-del').forEach(function(x){ x.remove(); });
      el.querySelectorAll('[data-ef]').forEach(function(f){ if(f.closest('[data-eitem]')===el) baLegacyReadonly(f, obj); });
    });
    baDecorate(false);
    baPaintStories(); baPaintRTM(); baPaintOKRs();
  }
  function baSave(){
    baCommitActive();
    var errors = baValidate(BA.state);
    if(errors.length){ baShowBanner(errors); return; }
    baClearBanner();
    if(!BA.state.project) BA.state.project = {};
    BA.state.project.lastEdited = baToday();
    var text = JSON.stringify(BA.state, null, 2);
    baWriteFile(text).then(function(method){
      if(method === null) return; // user cancelled picker
      BA.pristine = baClone(BA.state);
      baExitEditVisual();
      if(BA.host.afterSave){ BA.host.afterSave(baClone(BA.state)); }
      else { baApplyReadonly(); }
      baToast(method === 'download' ? 'Downloaded state.json' : 'Saved state.json (' + method + ')');
    });
  }
  function baWriteFile(text){
    return (async function(){
      if(baFileHandle && baFileHandle.createWritable){
        try { var w = await baFileHandle.createWritable(); await w.write(text); await w.close(); return 'in place'; }
        catch(e){ /* fall through */ }
      }
      if(window.showSaveFilePicker){
        try {
          var h = await window.showSaveFilePicker({ suggestedName: 'state.json',
            types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
          baFileHandle = h;
          var w2 = await h.createWritable(); await w2.write(text); await w2.close();
          return 'saved';
        } catch(e){ if(e && e.name === 'AbortError') return null; }
      }
      baDownload('state.json', text, 'application/json');
      return 'download';
    })();
  }

  /* ---- delegated edit listeners (wired once) ---- */
  function baCommitActive(){ var a = document.activeElement; if(a && a.classList && a.classList.contains('ba-ce')) baCommitText(a); }
  function baSetField(obj, ef, val){
    if(ef.indexOf('.') > -1){
      var parts = ef.split('.'), o = obj;
      for(var i=0;i<parts.length-1;i++){ if(o[parts[i]]==null) o[parts[i]] = {}; o = o[parts[i]]; }
      var last = parts[parts.length-1], old = o[last];
      if(old !== val){ baPushHist(obj, ef, old); o[last] = val; BA.dirty = true; }
      return;
    }
    var oldv = obj[ef];
    if(oldv !== val){ baPushHist(obj, ef, oldv); obj[ef] = val; BA.dirty = true; }
  }
  function baCommitText(el){
    var id = el.getAttribute('data-eid'), ef = el.getAttribute('data-ef');
    var obj = baFind(id); if(!obj) return;
    var nv = el.textContent.replace(/\s+$/,'').replace(/^\s+/,'');
    var idx = el.getAttribute('data-eidx');
    if(idx != null){ obj[ef] = obj[ef] || []; obj[ef][+idx] = nv; BA.dirty = true; return; }
    var required = (ef==='title' || ef==='question' || ef==='note' || ef==='summary' || ef==='name' || ef==='objective' || ef==='statement');
    var val = (nv === "" && !required) ? null : nv;
    baSetField(obj, ef, val);
  }
  function baOnFocusout(e){
    var el = e.target;
    if(el && el.classList && el.classList.contains('ba-ce')) baCommitText(el);
  }
  function baOnChange(e){
    var el = e.target;
    if(!el || !el.classList) return;
    if(el.classList.contains('ba-sel')){
      var obj = baFind(el.getAttribute('data-eid')); if(!obj) return;
      var v = el.value; if(el.getAttribute('data-enull')==='1' && v==='') v = null;
      baSetField(obj, el.getAttribute('data-ef'), v);
    } else if(el.classList.contains('ba-date')){
      var o2 = baFind(el.getAttribute('data-eid')); if(!o2) return;
      baSetField(o2, el.getAttribute('data-ef'), el.value || null);
    } else if(el.classList.contains('ba-num')){
      var o3 = baFind(el.getAttribute('data-eid')); if(!o3) return;
      var ef3 = el.getAttribute('data-ef'), raw = String(el.value==null?'':el.value).trim();
      var num = raw==='' ? null : parseFloat(raw);
      if(num!=null && isNaN(num)) num = null;
      baSetField(o3, ef3, num);
      if(ef3==='start' || ef3==='target' || ef3==='current'){
        if(baKrHasNums(o3)) o3.score = baKrDerive(o3);
        baRepaint();
      } else if(ef3==='score'){
        if(o3.score!=null){ if(o3.score<0)o3.score=0; if(o3.score>1)o3.score=1; }

  function baOnClick(e){
    var t = e.target;
    // while editing, stop clicks on edit controls from reaching provenance handlers
    // (keeps the caret / native control behaviour, suppresses the popover)
    if(BA.editing && t.closest && t.closest('.ba-ce,.ba-sel,.ba-date,.ba-num,.ba-del,.ba-add,.ba-confirm,[data-addclause],[data-delclause]')){
      e.stopPropagation();

    if(del && !del.classList.contains('ba-del-sm') && del.hasAttribute('data-del-id')){
      e.preventDefault(); e.stopPropagation();

    var delc = t.closest ? t.closest('[data-baconfirm]') : null;

      return; }
    // clause add/remove for scenarios
    var dc = t.closest ? t.closest('[data-delclause]') : null;
    if(dc){ e.preventDefault(); e.stopPropagation();
      var sc = baFind(dc.getAttribute('data-delclause')); if(sc){ var f=dc.getAttribute('data-df'); (sc[f]||[]).splice(+dc.getAttribute('data-di'),1); baRepaint(); } return; }
    var ac = t.closest ? t.closest('[data-addclause]') : null;
    if(ac){ e.preventDefault(); e.stopPropagation();
      var sc2 = baFind(ac.getAttribute('data-addclause')); if(sc2){ var f2=ac.getAttribute('data-df'); sc2[f2]=sc2[f2]||[]; sc2[f2].push(""); baRepaint(); } return; }
    // add-item

  function baConfirmDelete(del){

  function baRemoveById(coll, id){
    var arr = BA.state[coll];
    if(arr){ for(var i=0;i<arr.length;i++){ if(arr[i].id===id){ arr.splice(i,1); return true; } } }
    // nested: rules, examples, scenarios
    if(coll==='rules' || coll==='examples' || coll==='scenarios'){
      (BA.state.userStories||[]).forEach(function(us){
        if(coll==='scenarios'){ us.scenarios = (us.scenarios||[]).filter(function(s){ return s.id!==id; }); }
        (us.rules||[]).forEach(function(ru){
          if(coll==='rules'){ /* handled below */ }
          if(coll==='examples'){ ru.examples = (ru.examples||[]).filter(function(x){ return x.id!==id; }); }
        });
        if(coll==='rules'){ us.rules = (us.rules||[]).filter(function(r){ return r.id!==id; }); }
      });
    }
    if(coll==='keyResults'){
      (BA.state.okrs||[]).forEach(function(o){ o.keyResults = (o.keyResults||[]).filter(function(k){ return k.id!==id; }); });
    }
    return false;
  }

          start:null, target:null, current:null, unit:null, score:null, confidence:null, milestoneRef:null, sources:[], history:[] }); baRepaint(); } return;

    // legacy adds: append editable row/card

  function baWireEditButton(){

  var baListenersOn = false;
