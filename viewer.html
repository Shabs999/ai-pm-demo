  /* ---------------------- end BA MODULE ---------------------- */

  /* ====================================================================== *
   *  ASK BAR — deterministic natural-language drill-down (zero-LLM).        *
   *  Kept BYTE-IDENTICAL between render.py and viewer.html. Interprets the  *
   *  live DOM (filter options + rendered rows) and drives the existing      *
   *  filter/collapse controls via askInit(host). host = { apply(),          *
   *  expand(cardEl) } — both optional. Never mutates data; never networks.  *
   * ====================================================================== */
  var ASK = { host:null, hits:[], t:0 };
  function askNorm(s){ return String(s==null?'':s).toLowerCase()
    .replace(/[‘’]/g,"'").replace(/[“”]/g,'"').replace(/\s+/g,' ').trim(); }
  function askReduced(){ try{ return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches); }catch(e){ return false; } }
  function askSel(id){ return document.getElementById(id); }
  function askRows(sel){ try{ return Array.prototype.slice.call(document.querySelectorAll(sel)); }catch(e){ return []; } }
  function askPl(n,w){ return n===1 ? w : w+'s'; }
  function askEscRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
  function askWord(hay,w){ try{ return new RegExp('(^|[^a-z0-9])'+askEscRe(w)+'([^a-z0-9]|$)').test(hay); }catch(e){ return hay.indexOf(w)!==-1; } }

  function askApply(){ if(ASK.host && typeof ASK.host.apply==='function'){ try{ ASK.host.apply(); }catch(e){} } }
  function askSetSel(id,val){ var s=askSel(id); if(s) s.value=val; return !!s; }
  function askResetFilters(){ askSetSel('f-ws','all'); askSetSel('f-status','all'); askSetSel('f-owner','all'); }

  function askSection(sub){
    var cards=askRows('.card[data-sec]'), i, h;
    for(i=0;i<cards.length;i++){ if(cards[i].hidden) continue;
      h=cards[i].querySelector('.sec-head h2');
      if(h && askNorm(h.textContent).indexOf(sub)!==-1) return cards[i]; }
    return null;
  }
  function askExpand(sub){
    var card = (sub && sub.nodeType) ? sub : askSection(sub);
    if(!card || card.hidden) return null;
    if(ASK.host && typeof ASK.host.expand==='function'){ try{ ASK.host.expand(card); }catch(e){} }
    else { card.setAttribute('data-collapsed','false');
      var h=card.querySelector('.sec-head'); if(h) h.setAttribute('aria-expanded','true'); }
    return card;
  }
  function askExpandFor(el){ var c=el && el.closest ? el.closest('.card[data-sec]') : null; if(c) askExpand(c); }

  function askClear(){ ASK.hits.forEach(function(el){ el.classList.remove('ask-hit'); el.classList.remove('ask-pulse'); }); ASK.hits=[]; }
  function askHit(el){ if(el && ASK.hits.indexOf(el)===-1){ el.classList.add('ask-hit'); ASK.hits.push(el); } }
  function askHitEach(sel){ var n=0; askRows(sel).forEach(function(el){ if(el.hidden) return; askHit(el); n++; }); return n; }
  function askSortHits(){ ASK.hits.sort(function(a,b){ var p=a.compareDocumentPosition(b);
    if(p & 4) return -1; if(p & 2) return 1; return 0; }); }
  function askScroll(){
    if(!ASK.hits.length) return;
    var first=ASK.hits[0];
    try{ first.scrollIntoView({block:'center', behavior: askReduced()?'auto':'smooth'}); }
    catch(e){ try{ first.scrollIntoView(); }catch(e2){} }
    if(!askReduced()){ first.classList.add('ask-pulse');
      setTimeout(function(){ if(first) first.classList.remove('ask-pulse'); }, 1000); }
  }

  function askOwner(n){
    var s=askSel('f-owner'); if(!s) return null; var o=s.options, i, txt, toks, j;
    for(i=0;i<o.length;i++){ if(o[i].value==='all') continue; txt=askNorm(o[i].text);
      if(!txt || txt==='unassigned') continue;
      if(n.indexOf(txt)!==-1) return { value:o[i].value, label:o[i].text }; }
    for(i=0;i<o.length;i++){ if(o[i].value==='all') continue; txt=askNorm(o[i].text);
      if(!txt || txt==='unassigned') continue; toks=txt.split(' ');
      for(j=0;j<toks.length;j++){ if(toks[j].length>=3 && askWord(n,toks[j])) return { value:o[i].value, label:o[i].text }; } }
    return null;
  }
  function askWs(n){
    var s=askSel('f-ws'); if(!s) return null; var o=s.options, i, txt;
    for(i=0;i<o.length;i++){ if(o[i].value==='all') continue; txt=askNorm(o[i].text);
      if(txt && n.indexOf(txt)!==-1) return { value:o[i].value, label:o[i].text }; }
    return null;
  }
  var ASK_STATUS = [
    ['late', /\b(late|past due)\b/],
    ['at-risk', /\bat.?risk\b/],
    ['on-track', /\bon.?track\b/],
    ['planned', /\bplanned\b/],
    ['in-progress', /\b(in.?progress|ongoing|wip)\b/],
    ['done', /\b(done|complete|completed|finished|closed)\b/],
    ['dropped', /\bdropped\b/],
    ['open', /\bopen\b/]
  ];
  function askStatus(n){
    var s=askSel('f-status'); if(!s) return null; var i, j, val;
    for(i=0;i<ASK_STATUS.length;i++){ if(ASK_STATUS[i][1].test(n)){ val=ASK_STATUS[i][0];
      for(j=0;j<s.options.length;j++){ if(s.options[j].value===val) return { value:val, label:s.options[j].text }; } } }
    return null;
  }

  function askTitleText(el){
    var t=el.querySelector('[data-ef="title"], .raid-title, .req-title, .sc-title, .q-text, .cf-about, [data-ef="summary"], [data-ef="question"], .wc-title, .pk-note, .okr-obj, .kr-stmt');
    return askNorm(t ? t.textContent : el.textContent);
  }
  function askCellText(el, sel){ var x=el.querySelector(sel); return x ? x.textContent.replace(/\s+/g,' ').trim() : ''; }
  function askDescribe(el){
    if(!el) return '';
    var q1='“', q2='”';
    if(el.matches && el.matches('tr[data-eitem="milestones"]'))
      return 'Milestone '+q1+askCellText(el,'[data-ef="title"]')+q2+' — due '+(askCellText(el,'[data-ef="due"]')||'—')+', '+(el.getAttribute('data-status')||askCellText(el,'[data-ef="status"]'));
    if(el.matches && el.matches('tr[data-eitem="actions"]')){
      var ow=el.children[1] ? el.children[1].textContent.replace(/\s+/g,' ').trim() : '';
      return 'Action '+q1+askCellText(el,'[data-ef="title"]')+q2+' — '+(ow?ow+', ':'')+'due '+(askCellText(el,'[data-ef="due"]')||'—')+', '+askCellText(el,'[data-ef="status"]'); }
    if(el.matches && el.matches('.raid-item'))
      return 'Risk '+q1+askCellText(el,'.raid-title')+q2+' — '+(askCellText(el,'[data-ef="severity"]')?askCellText(el,'[data-ef="severity"]')+', ':'')+askCellText(el,'.raid-status');
    if(el.matches && el.matches('[data-eitem="decisions"]'))
      return 'Decision '+q1+askCellText(el,'[data-ef="summary"]')+q2+' — '+askCellText(el,'[data-ef="date"]');
    if(el.matches && el.matches('[data-eitem="openQuestions"]'))
      return 'Open question '+q1+askCellText(el,'[data-ef="question"]')+q2;
    if(el.matches && el.matches('[data-eitem="requirements"]'))
      return 'Requirement '+q1+askCellText(el,'[data-ef="title"]')+q2;
    var t=askCellText(el,'[data-ef="title"], .raid-title, .req-title, .sc-title, .q-text, .cf-about, .pill-t, [data-ef="summary"], [data-ef="question"]');
    return t ? (q1+t+q2) : '';
  }
  function askFreeHits(n){
    var els=askRows('tr[data-eitem], .raid-item, .d-item, .req, .sc, .q-item, .cf-item, .wc-item, .pk-item, .okr, .kr'), hits=[];
    els.forEach(function(el){ if(askTitleText(el).indexOf(n)!==-1) hits.push(el); });
    return hits;
  }

  function askResult(msg){ var r=askSel('ask-result'); if(r) r.textContent = msg || ''; }
  function askIsSummary(n){
    if(n==='status'||n==='summary'||n==='health'||n==='overview'||n==='report') return true;
    return /where are we|where do we stand|how are we|how.s it going|project health|status report|overall status/.test(n);
  }

  function askRun(q, scroll){
    askClear();
    var n=askNorm(q), clr=askSel('ask-clear');
    if(clr) clr.hidden = !(q && q.length);
    if(!n){ askResetFilters(); askApply(); askResult(''); return; }

    if(askIsSummary(n)){
      askResetFilters(); askApply();
      var sb=askSel('status-report');
      if(sb){ sb.click(); askResult('Opening the status report…'); }
      else askResult('No status report available.');
      return;
    }

    askResetFilters();
    var owner=askOwner(n), ws=askWs(n);
    if(owner) askSetSel('f-owner', owner.value);
    if(ws) askSetSel('f-ws', ws.value);
    var forWho = owner ? (' for '+owner.label) : '';

    function done(msg){ askSortHits(); askResult(msg); if(scroll) askScroll(); }
    function seg2(a,b){ var s=[]; if(a) s.push(a); if(b) s.push(b); return s.join(' and '); }

    if(/\b(overdue|past due)\b/.test(n) || (/\blate\b/.test(n) && !/\bat.?risk\b/.test(n))){
      askApply(); askExpand('action'); askExpand('milestone');
      var oa=askHitEach('tr[data-eitem="actions"].row-overdue');
      var lm=askHitEach('tr[data-eitem="milestones"][data-status="late"]');
      if(!oa && !lm){ done('No overdue actions or late milestones'+forWho+' — on track.'); return; }
      done('Showing '+seg2(oa?oa+' overdue '+askPl(oa,'action'):'', lm?lm+' late '+askPl(lm,'milestone'):'')+forWho+' — highlighted below.'); return;
    }
    if(/\bat.?risk\b/.test(n)){
      askApply(); askExpand('raid'); askExpand('milestone');
      var am=askHitEach('tr[data-eitem="milestones"][data-status="at-risk"]');
      var rk=askHitEach('.raid-item[data-eitem="risks"]');
      if(!am && !rk){ done('Nothing flagged at risk'+forWho+'.'); return; }
      done('Showing '+seg2(am?am+' at-risk '+askPl(am,'milestone'):'', rk?rk+' open '+askPl(rk,'risk'):'')+' — highlighted below.'); return;
    }
    if(/\brisks?\b/.test(n)){
      askApply(); askExpand('raid');
      var qual='', c=0;
      if(/\bcritical\b/.test(n)) qual='critical';
      else if(/\bhigh\b/.test(n)) qual='high';
      if(qual){ askRows('.raid-item[data-eitem="risks"] .sev-'+qual).forEach(function(sv){ var it=sv.closest('.raid-item'); if(it && !it.hidden){ askHit(it); c++; } }); }
      else c=askHitEach('.raid-item[data-eitem="risks"]');
      if(!c){ done('No '+(qual?qual+' ':'')+'risks recorded.'); return; }
      done('Showing '+c+' '+(qual?qual+' ':'')+askPl(c,'risk')+' — highlighted below.'); return;
    }
    if(/\b(issue|issues|blocker|blockers|blocked|dependency|dependencies|depend)\b/.test(n)){
      askApply(); askExpand('raid');
      var ic=askHitEach('.raid-item[data-eitem="issues"]');
      var dc=askHitEach('.raid-item[data-kind="raid"]:not([data-eitem])');
      if(!ic && !dc){ done('No open issues or dependencies.'); return; }
      done('Showing '+seg2(ic?ic+' '+askPl(ic,'issue'):'', dc?dc+' '+askPl(dc,'dependency'):'')+' — highlighted below.'); return;
    }
    if(/\b(decision|decisions|decided|rationale)\b/.test(n) || n==='why'){
      askApply(); askExpand('decision');
      var qd=n.replace(/\b(decision|decisions|decided|rationale|why|about|on|the|for)\b/g,' ').replace(/\s+/g,' ').trim();
      var dcn=0; askRows('[data-eitem="decisions"]').forEach(function(el){ if(el.hidden) return;
        if(!qd || askTitleText(el).indexOf(qd)!==-1){ askHit(el); dcn++; } });
      if(!dcn){ done('No decisions'+(qd?' about “'+qd+'”':'')+' recorded.'); return; }
      done('Showing '+dcn+' '+askPl(dcn,'decision')+(qd?' about “'+qd+'”':'')+' — highlighted below.'); return;
    }
    if(/\b(milestone|milestones|roadmap|timeline|deadline|deadlines|go.?live|golive|launch|launches|go live)\b/.test(n)){
      askApply(); askExpand('roadmap'); askExpand('milestone');
      if(/go.?live|golive|launch|launches|production|go live/.test(n)){
        var target=null;
        askRows('tr[data-eitem="milestones"]').forEach(function(el){ if(el.hidden||target) return;
          if(/go.?live|golive|launch|production|go live/.test(askTitleText(el))) target=el; });
        if(target){ askHit(target); done(askDescribe(target)+' — highlighted below.'); return; }
      }
      var mc=askHitEach('tr[data-eitem="milestones"]');
      if(!mc){ done('No milestones'+(ws?' in '+ws.label:'')+'.'); return; }
      done('Showing '+mc+' '+askPl(mc,'milestone')+(ws?' in '+ws.label:'')+' — highlighted below.'); return;
    }
    if(/\b(requirement|requirements|use case|use cases|scenario|scenarios|story|stories|user story|bdd|gherkin)\b/.test(n)){
      askApply(); askExpand('requirement'); askExpand('stories');
      var rc=askHitEach('[data-eitem="requirements"]');
      var scc=askHitEach('.sc');
      if(!rc && !scc){ done('No requirements or scenarios recorded.'); return; }
      done('Showing '+seg2(rc?rc+' '+askPl(rc,'requirement'):'', scc?scc+' '+askPl(scc,'scenario'):'')+' — highlighted below.'); return;
    }
    if(/\b(conflict|conflicts|changed|change|changes|moved|slipped|slip)\b/.test(n)){
      askApply(); var cf=askExpand('conflict'), wc=askExpand('changed');
      var cc=cf?askHitEach('.cf-item'):0;
      var wcn=wc?askHitEach('.wc-item'):0;
      if(!cc && !wcn){ done('Nothing changed recently and no open conflicts.'); return; }
      done('Showing '+seg2(cc?cc+' '+askPl(cc,'conflict'):'', wcn?wcn+' recent '+askPl(wcn,'change'):'')+' — highlighted below.'); return;
    }
    if(/\b(open question|open questions|question|questions|unknown|unknowns|undecided|unresolved)\b/.test(n)){
      askApply(); askExpand('question');
      var qc=askHitEach('[data-eitem="openQuestions"]');
      if(!qc){ done('No open questions recorded.'); return; }
      done('Showing '+qc+' open '+askPl(qc,'question')+' — highlighted below.'); return;
    }
    if(/\b(rtm|traceability|uat|test|tests|testing|acceptance)\b/.test(n)){
      askApply(); var rt=askExpand('traceability');
      if(!rt){ done('No traceability matrix available yet.'); return; }
      var tc=askHitEach('#ba-rtm-body tbody tr');
      done(tc ? ('Traceability matrix — '+tc+' '+askPl(tc,'row')+' highlighted below.') : 'Traceability matrix expanded below.'); return;
    }
    if(/\b(okr|okrs|objective|objectives|key result|key results|krs?)\b/.test(n) || /\bscore\b/.test(n)){
      askApply(); var okc=askExpand('okr');
      if(!okc){ done('No OKRs recorded yet.'); return; }
      var oh=askHitEach('.okr'), kh=askHitEach('.kr');
      if(!oh && !kh){ done('No OKRs recorded yet.'); return; }
      if(/\bscore\b/.test(n)){
        var acards=askRows('.okr[data-okr-status="active"]'), vals=[];
        acards.forEach(function(c){ if(c.hidden) return; var r=c.getAttribute('data-okr-rollup');
          if(r){ var f=parseFloat(r); if(!isNaN(f)) vals.push(f); } });
        if(vals.length){ var sm=0; vals.forEach(function(x){ sm+=x; });
          done('OKR score '+(sm/vals.length).toFixed(1)+' across '+vals.length+' active '+askPl(vals.length,'objective')+' — highlighted below.'); return; }
      }
      done('Showing '+oh+' '+askPl(oh,'objective')+' — highlighted below.'); return;
    }

    if(owner){
      askApply(); askExpand('action');
      var ac=askHitEach('tr[data-eitem="actions"]');
      done(ac ? ('Showing '+ac+' '+askPl(ac,'action')+' owned by '+owner.label+' — highlighted below.') : ('No actions for '+owner.label+'.')); return;
    }
    if(ws){
      askApply(); askExpand('roadmap'); askExpand('milestone');
      var wm=askHitEach('tr[data-eitem="milestones"]');
      done(wm ? ('Filtered to '+ws.label+' — '+wm+' '+askPl(wm,'milestone')+' highlighted below.') : ('Filtered to workstream '+ws.label+'.')); return;
    }
    var stat=askStatus(n);
    if(stat){
      askSetSel('f-status', stat.value); askApply();
      askExpand('milestone'); askExpand('action');
      var sm=askHitEach('tr[data-eitem="milestones"]'), sa=askHitEach('tr[data-eitem="actions"]'), tot=sm+sa;
      done(tot ? ('Filtered to “'+stat.label+'” — '+tot+' '+askPl(tot,'item')+' shown.') : ('Nothing with status “'+stat.label+'”.')); return;
    }

    var hits=askFreeHits(n);
    if(hits.length){
      hits.forEach(function(el){ askExpandFor(el); askHit(el); });
      askApply();
      if(hits.length===1){ done(askDescribe(hits[0])+' — highlighted below.'); return; }
      done('Showing '+hits.length+' matches for “'+askNorm(q)+'” — highlighted below.'); return;
    }
    askApply();
    done('No match — try a status, a section, or a name.');
  }

  function askResetAll(){
    if(ASK.t){ clearTimeout(ASK.t); ASK.t=0; }
    askClear(); askResetFilters(); askApply(); askResult('');
    var clr=askSel('ask-clear'); if(clr) clr.hidden=true;
  }
  function askInit(host){
    ASK.host = host || {};
    var input=askSel('ask-input'); if(!input || input.__askWired) return;
    input.__askWired = true;
    input.addEventListener('input', function(){ if(ASK.t) clearTimeout(ASK.t);
      ASK.t=setTimeout(function(){ ASK.t=0; try{ askRun(input.value, false); }catch(e){} }, 250); });
    input.addEventListener('keydown', function(e){
      if(e.key==='Enter'){ e.preventDefault(); if(ASK.t){ clearTimeout(ASK.t); ASK.t=0; } try{ askRun(input.value, true); }catch(e2){} }
      else if(e.key==='Escape'){ e.preventDefault(); input.value=''; askResetAll(); input.blur(); } });
    var clr=askSel('ask-clear');
    if(clr) clr.addEventListener('click', function(){ input.value=''; askResetAll(); input.focus(); });
  }
  /* ---------------------- end ASK BAR ---------------------- */


/* ---- theme toggle (manual override of prefers-color-scheme) ---- */
var SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>';
var MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>';
function activeTheme(){
  var t = document.documentElement.getAttribute("data-theme");
  if(t === "light" || t === "dark") return t;
  return (window.matchMedia && window.matchMedia("(prefers-color-scheme:dark)").matches) ? "dark" : "light";
}
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  try { localStorage.setItem("aipm-theme", t); } catch(e){}
  updateThemeIcon();
}
function updateThemeIcon(){
  var btn = document.getElementById("theme-toggle");
  if(!btn) return;
  var dark = activeTheme() === "dark";
  // Show the icon of the mode you'll switch TO.
  btn.innerHTML = dark ? SUN : MOON;
  btn.setAttribute("aria-label", dark ? "Switch to light theme" : "Switch to dark theme");
}

function wireInteractivity(){
  document.querySelectorAll(".sec-head").forEach(function(h){
    h.addEventListener("click", function(){
      var card = h.closest(".card");
      var col = card.getAttribute("data-collapsed") === "true";
      card.setAttribute("data-collapsed", col ? "false" : "true");
      h.setAttribute("aria-expanded", col ? "true" : "false");
      saveSections();
    });
  });

  // expand / collapse all
  function setAll(collapsed){
    document.querySelectorAll(".card[data-sec]").forEach(function(c){
      c.setAttribute("data-collapsed", collapsed ? "true" : "false");
      var h = c.querySelector(".sec-head");
      if(h) h.setAttribute("aria-expanded", collapsed ? "false" : "true");
    });
    saveSections();
  }
  var ea = document.getElementById("expand-all");
  var ca = document.getElementById("collapse-all");
  if(ea) ea.addEventListener("click", function(){ setAll(false); });
  if(ca) ca.addEventListener("click", function(){ setAll(true); });

  // theme toggle
  var tt = document.getElementById("theme-toggle");
  if(tt){
    updateThemeIcon();
    tt.addEventListener("click", function(){ setTheme(activeTheme() === "dark" ? "light" : "dark"); });
  }

  var fWs = document.getElementById("f-ws");
  var fSt = document.getElementById("f-status");
  var fOw = document.getElementById("f-owner");
  function apply(){
    var ws = fWs.value, st = fSt.value, ow = fOw.value;
    document.querySelectorAll('[data-kind="ms"]').forEach(function(el){
      var okWs = ws === "all" || el.getAttribute("data-ws") === ws;
      var okSt = st === "all" || el.getAttribute("data-status") === st;
      el.hidden = !(okWs && okSt);
    });
    document.querySelectorAll('.lane-band[data-ws], .lane-label[data-ws]').forEach(function(el){
      el.style.display = (ws === "all" || el.getAttribute("data-ws") === ws) ? "" : "none";
    });
    document.querySelectorAll('[data-kind="act"]').forEach(function(el){
      var okOw = ow === "all" || el.getAttribute("data-owner") === ow;
      var okSt = st === "all" || el.getAttribute("data-status") === st;
      el.hidden = !(okOw && okSt);
    });
    toggleEmpty(".hero .plot", '[data-kind="ms"]:not([hidden])', ".hero .filter-empty");
    document.querySelectorAll("table.grid").forEach(function(tbl){
      var vis = tbl.querySelectorAll("tbody tr:not([hidden])").length;
      var e = tbl.parentNode.querySelector(".filter-empty");
      if(e) e.hidden = vis !== 0;
    });
  }
  function toggleEmpty(scope, sel, emptySel){
    var s = document.querySelector(scope); if(!s) return;
    var vis = s.querySelectorAll(sel).length;
    var e = document.querySelector(emptySel); if(e) e.hidden = vis !== 0;
  }
  [fWs, fSt, fOw].forEach(function(s){ if(s) s.addEventListener("change", apply); });
  var reset = document.getElementById("f-reset");
  if(reset) reset.addEventListener("click", function(){ fWs.value = "all"; fSt.value = "all"; fOw.value = "all"; apply(); });

  wireProvenance(document);

  if(fWs && fSt && fOw) apply();

  askInit({ apply: apply, expand: function(card){
    card.setAttribute("data-collapsed", "false");
    var h = card.querySelector(".sec-head"); if(h) h.setAttribute("aria-expanded", "true");
    saveSections();
  } });
}

/* ========================================================================== */
/*  LOADING                                                                    */
/* ========================================================================== */
function nowStr(){
  var d = new Date();
  function p(n){ return (n < 10 ? "0" : "") + n; }
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) +
    " " + p(d.getHours()) + ":" + p(d.getMinutes());
}

function renderState(state, name){
  closePop();
  assembleDashboard(state, {name: name, loadedAt: nowStr()});
  if(PASTED) mountPasteBar(state);
  window.scrollTo(0, 0);
}

/* ---- pasted-JSON session: flag, download bar, dismiss ---- */
var PASTED = false;
var pasteBarDismissed = false;

function hostDownloadJSON(state){
  var text = JSON.stringify(state, null, 2);
  var blob = new Blob([text], {type: "application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "state.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 0);
}

function mountPasteBar(state){
  if(pasteBarDismissed) return;
  var wrap = app.querySelector(".wrap");
  if(!wrap) return;
  var bar = document.createElement("div");
  bar.className = "pastebar";
  bar.innerHTML =
    '<span class="pastebar-txt">Loaded from pasted JSON — verify below, then save it to ' +
    'SharePoint as <code>state.json</code></span>' +
    '<button type="button" class="pastebar-dl" id="pastebar-dl">Download state.json</button>' +
    '<button type="button" class="pastebar-x" id="pastebar-x" aria-label="Dismiss">×</button>';
  wrap.insertBefore(bar, wrap.firstChild);
  var dl = bar.querySelector("#pastebar-dl");
  if(dl) dl.addEventListener("click", function(){ hostDownloadJSON(state); });
  var x = bar.querySelector("#pastebar-x");
  if(x) x.addEventListener("click", function(){ pasteBarDismissed = true; bar.remove(); });
}

function showPasteError(msg){
  var el = document.getElementById("dz-paste-err");
  if(el){ el.textContent = msg; el.hidden = false; }
}

function loadFromPaste(raw){
  var text = String(raw == null ? "" : raw).trim();
  if(!text){ showPasteError("Nothing to load — paste the digester’s reply first."); return; }
  // defensively strip a wrapping markdown code fence (```json … ```)
  text = text.replace(/^```[^\n]*\n/, "").replace(/\n```\s*$/, "").trim();
  var state;
  try { state = JSON.parse(text); }
  catch(e){
    var msg = String(e && e.message ? e.message : e).slice(0, 120);
    showPasteError("Not valid JSON — " + msg + ". Copy the FULL reply and try again.");
    return;
  }
  PASTED = true;
  pasteBarDismissed = false;
  renderState(state, "pasted JSON");
}

function showParseError(name, message){
  closePop();
  document.title = "AI PM — Could not read state file";
  app.innerHTML =
    '<div class="centre"><div class="parse-card">' +
    '<h2>Could not read ' + esc(name) + '</h2>' +
    '<p>The file loaded, but it is not valid JSON, so nothing can be rendered.</p>' +
    '<div class="parse-msg">' + esc(message) + '</div>' +
    '<button class="dz-btn" id="parse-retry" type="button">Open a different file</button>' +
    '</div></div>';
  var b = document.getElementById("parse-retry");
  if(b) b.addEventListener("click", function(){ showDropZone(null, "Open or drag your state.json here"); });
}

function loadFromText(text, name){
  PASTED = false;
  var state;
  try { state = JSON.parse(text); }
  catch(e){ showParseError(name, String(e && e.message ? e.message : e)); return; }
  renderState(state, name);
}

function fetchState(url, name, dropOnFail){
  fetch(url).then(function(res){
    if(!res.ok) throw new Error("HTTP " + res.status);
    return res.text();
  }).then(function(text){
    loadFromText(text, name);
  }).catch(function(err){
    if(dropOnFail){
      showDropZone("Couldn't load “" + name + "” automatically — open it manually below.",
                   "Open or drag your state.json here");
    } else {
      showDropZone("Couldn't load “" + name + "” (" + (err && err.message ? err.message : err) + ").",
                   "Open or drag your state.json here");
    }
  });
}

function showDropZone(errMsg, title){
  closePop();
  document.title = "AI PM — Dashboard viewer";
  var icon = '<div class="dz-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M12 16V4M12 4l-4 4M12 4l4 4"></path>' +
    '<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path></svg></div>';
  app.innerHTML =
    '<div class="centre"><div class="dropzone" id="dropzone">' + icon +
    '<div class="dz-title">' + esc(title || "Open or drag your state.json here") + '</div>' +
    '<div class="dz-sub">Everything renders locally in your browser. ' +
    'Your data is never uploaded or sent anywhere.</div>' +
    '<div class="dz-actions"><button class="dz-btn" id="dz-pick" type="button">Choose file…</button>' +
    '<input type="file" id="dz-file" class="dz-input" accept=".json,application/json"></div>' +
    (errMsg ? '<div class="dz-err">' + esc(errMsg) + '</div>' : '') +
    '<div class="dz-or">or</div>' +
    '<div class="dz-paste">' +
    '<label class="dz-paste-label" for="dz-paste-ta">Paste the digester’s reply</label>' +
    '<textarea id="dz-paste-ta" class="dz-textarea" rows="7" spellcheck="false" ' +
    'placeholder="Paste the digester&#39;s full state.json reply here"></textarea>' +
    '<div class="dz-err" id="dz-paste-err" hidden></div>' +
    '<div class="dz-paste-actions">' +
    '<button class="dz-btn" id="dz-paste-btn" type="button">Load pasted JSON</button></div>' +
    '</div>' +
    '<div class="dz-note">Tip: on a network share you can also add ' +
    '<code>?state=path/to/state.json</code> to the URL.</div>' +
    '</div></div>';

  var zone = document.getElementById("dropzone");
  var input = document.getElementById("dz-file");
  var pick = document.getElementById("dz-pick");
  var pasteTa = document.getElementById("dz-paste-ta");
  var pasteBtn = document.getElementById("dz-paste-btn");
  function doPasteLoad(){ loadFromPaste(pasteTa ? pasteTa.value : ""); }
  if(pasteBtn) pasteBtn.addEventListener("click", doPasteLoad);
  if(pasteTa) pasteTa.addEventListener("keydown", function(e){
    if((e.metaKey || e.ctrlKey) && e.key === "Enter"){ e.preventDefault(); doPasteLoad(); }
  });

  pick.addEventListener("click", function(){
    if(window.showOpenFilePicker){
      window.showOpenFilePicker({ types:[{ description:"JSON", accept:{ "application/json":[".json"] } }] })
        .then(function(hs){ baFileHandle = hs[0]; return hs[0].getFile(); })
        .then(function(f){ readFile(f); })
        .catch(function(e){ if(!(e && e.name === "AbortError")) input.click(); });
    } else { input.click(); }
  });
  input.addEventListener("change", function(){
    if(input.files && input.files[0]) readFile(input.files[0]);
  });

  ["dragenter","dragover"].forEach(function(ev){
    zone.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.add("drag"); });
  });
  ["dragleave","dragend"].forEach(function(ev){
    zone.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.remove("drag"); });
  });
  zone.addEventListener("drop", function(e){
    e.preventDefault(); e.stopPropagation(); zone.classList.remove("drag");
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if(f) readFile(f);
  });
  // swallow drops elsewhere on the page so the browser doesn't navigate away
  document.addEventListener("dragover", preventNav);
  document.addEventListener("drop", preventNav);
}
function preventNav(e){ e.preventDefault(); }

function readFile(file){
  var reader = new FileReader();
  reader.onload = function(){ loadFromText(String(reader.result), file.name); };
  reader.onerror = function(){ showDropZone("Couldn't read that file. Try again.", "Open or drag your state.json here"); };
  reader.readAsText(file);
}

/* ---- boot sequence: embedded -> ?state= -> fetch state.json -> drop zone --- */
function boot(){
  var emb = document.getElementById("embedded-state");
  var txt = emb ? (emb.textContent || "").trim() : "";
  if(txt){ loadFromText(txt, "embedded state"); return; }

  var qs = new URLSearchParams(window.location.search);
  var url = qs.get("state");
  if(url && !/^([a-z]+:)?\/\//i.test(url)){ fetchState(url, url, false); return; }

  fetchState("state.json", "state.json", true);
}

boot();
})();
</script>
