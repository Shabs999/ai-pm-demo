/* ========================================================================== */
/*  PROGRAM AGGREGATION MODEL                                                  */
/* ========================================================================== */
/* A "project" record: {folder, title, stateFile, state|null, error|null,
   color, health, verdict, counts, validation:{errors}}. */
function decorate(records, today){
  records.forEach(function(pr, i){
    pr.color = PROJECT_COLORS[i % PROJECT_COLORS.length];
    if(pr.state){
      var h = deriveHealth(pr.state);
      pr.healthLevel = h[0]; pr.verdict = h[1];
      pr.counts = projCounts(pr.state, today);
      pr.validation = validate(pr.state);
      pr.name = pr.title || (pr.state.project && pr.state.project.name) || pr.folder || pr.stateFile || "Untitled project";
      pr.client = (pr.state.project && pr.state.project.client) || "";
    } else {
      pr.name = pr.title || pr.folder || pr.stateFile || "Unknown project";
    }
  });
  return records;
}

/* ------------------------------------------------------ combined timeline --- */
function buildProgramTimeline(records, today){
  var dated = [];
  records.forEach(function(pr){
    if(!pr.state) return;
    (pr.state.milestones || []).forEach(function(m){ var d = parseDate(m.due); if(d) dated.push(d.t); });
  });
  var lo, hi;
  if(dated.length){ lo = dated[0]; hi = dated[0]; dated.forEach(function(t){ if(t < lo) lo = t; if(t > hi) hi = t; }); }
  else { lo = today; hi = today; }
  var start = monthFloor(lo < today ? lo : today);
  var end = addMonth(hi > today ? hi : today);
  var span = Math.max(days(end, start), 1);
  function x_of(d){ return days(d, start) / span * PLOT_W; }
  var months = [], mm = new Date(start.getTime());
  while(mm <= end){
    var firstOrJan = (mm.getTime() === start.getTime()) || (mm.getUTCMonth() === 0);
    var label = firstOrJan ? (MONTHS[mm.getUTCMonth()] + " " + mm.getUTCFullYear()) : MONTHS[mm.getUTCMonth()];
    months.push({x: round2(x_of(mm)), label: label});
    mm = addMonth(mm);
  }
  var today_x = (start <= today && today <= end) ? round2(x_of(today)) : null;
  var lanes = [], unsched = [], y = MONTHS_H;
  records.forEach(function(pr){
    if(!pr.state) return;                 // error projects are omitted from the plot
    var items = [], uns = [];
    (pr.state.milestones || []).forEach(function(m){ if(parseDate(m.due)) items.push(m); else uns.push(m); });
    items.sort(function(a, b){ return a.due < b.due ? -1 : (a.due > b.due ? 1 : 0); });
    var rows_right = [], placements = [];
    items.forEach(function(m){
      var x = x_of(parseDate(m.due).t);
      var shown = truncate(m.title, 30);
      var pill_w = DOT + 6 + shown.length * CHAR_W + 16;
      var left_side = x > PLOT_W * LABEL_FLIP;
      var span_lo = left_side ? (x - pill_w + DOT / 2) : (x - DOT / 2);
      var span_hi = span_lo + pill_w;
      var row = null;
      for(var i = 0; i < rows_right.length; i++){
        if(span_lo >= rows_right[i] + H_GAP){ row = i; rows_right[i] = span_hi; break; }
      }
      if(row === null){ row = rows_right.length; rows_right.push(span_hi); }
      placements.push({m:m, shown:shown, left:round2(span_lo), width:round2(pill_w), row:row, left_side:left_side});
    });
    var n_rows = Math.max(1, rows_right.length);
    var lane_h = LANE_PAD * 2 + n_rows * PILL_H + (n_rows - 1) * V_GAP;
    lanes.push({pr:pr, top:y, height:lane_h, placements:placements, n_rows:n_rows});
    y += lane_h;
    if(uns.length) unsched.push({pr:pr, items:uns});
  });
  return {months:months, today_x:today_x, lanes:lanes, plot_h:y, unsched:unsched};
}

function renderTimeline(tl){
  POP_MS = [];   // pill detail registry rebuilds with every render
  var legend = MS_STATUS_ORDER.map(function(s){
    return '<span class="lg"><span class="dot mk-' + MS_STATUS[s].cls + '">' +
           esc(MS_STATUS[s].glyph) + '</span>' + esc(MS_STATUS[s].label) + '</span>';
  }).join("");

  var gutter = ['<div class="lane-spacer" style="height:' + MONTHS_H + 'px"></div>'];
  tl.lanes.forEach(function(lane){
    gutter.push(
      '<div class="lane-label" style="height:' + lane.height + 'px">' +
      '<span class="chip-dot" style="background:' + esc(safeColor(lane.pr.color)) + '"></span>' +
      '<span class="lane-name">' + esc(lane.pr.name) + '</span></div>');
  });

  var plot = [];
  tl.months.forEach(function(mo){
    plot.push(
      '<div class="grid-line" style="left:' + mo.x + 'px;top:' + MONTHS_H + 'px;height:' + (tl.plot_h - MONTHS_H) + 'px"></div>' +
      '<div class="grid-label" style="left:' + (mo.x + 5) + 'px">' + esc(mo.label) + '</div>');
  });
  tl.lanes.forEach(function(lane, idx){
    var band = (idx % 2) ? "band-alt" : "band";
    plot.push('<div class="lane-band ' + band + '" style="top:' + lane.top + 'px;height:' + lane.height + 'px;width:' + PLOT_W + 'px"></div>');
  });
  if(tl.today_x !== null){
    plot.push(
      '<div class="today-line" style="left:' + tl.today_x + 'px;top:' + (MONTHS_H - 4) + 'px;height:' + (tl.plot_h - MONTHS_H + 4) + 'px"></div>' +
      '<div class="today-tag" style="left:' + (tl.today_x + 5) + 'px">Today</div>');
  }
  tl.lanes.forEach(function(lane){
    lane.placements.forEach(function(p){
      var m = p.m, meta = MS_STATUS[m.status] || MS_STATUS["planned"];
      var top = lane.top + LANE_PAD + p.row * (PILL_H + V_GAP);
      var side = p.left_side ? "flip" : "";
      var title_full = lane.pr.name + " · " + m.title + " · " + fmtDate(m.due) + " · " + meta.label;
      plot.push(
        '<button class="pill ' + side + '" data-status="' + esc(m.status) + '"' + msPopAttr(lane.pr, m) + ' ' +
        'style="left:' + p.left + 'px;top:' + top + 'px;min-width:' + p.width + 'px" ' +
        'title="' + esc(title_full) + '">' +
        msPillDot(m.status) + '<span class="pill-t">' + esc(p.shown) + '</span></button>');
    });
  });

  var unsched = "";
  if(tl.unsched.length){
    var groups = tl.unsched.map(function(g){
      var chips = g.items.map(function(m){
        var meta = MS_STATUS[m.status] || MS_STATUS["planned"];
        return '<button class="pill" data-status="' + esc(m.status) + '"' + msPopAttr(g.pr, m) + ' ' +
               'title="' + esc(g.pr.name + " · " + m.title + " · " + meta.label) + '">' +
               msPillDot(m.status) + '<span class="pill-t">' + esc(truncate(m.title, 30)) + '</span></button>';
      }).join("");
      return '<div class="uns-group"><span class="uns-prefix" style="background:' + esc(safeColor(g.pr.color)) + '">' +
             esc(g.pr.name) + '</span>' + chips + '</div>';
    }).join("");
    unsched = '<div class="unsched"><span class="unsched-lbl">Unscheduled</span>' +
              '<div class="uns-groups">' + groups + '</div></div>';
  }

  var totalPlaced = tl.lanes.reduce(function(n, l){ return n + l.placements.length; }, 0);
  var placeholder = "";
  if(totalPlaced === 0){
    var msg = tl.unsched.length ? ("No dated milestones yet — all milestones are unscheduled, listed below") : "No milestones recorded across these projects yet.";
    placeholder = '<div class="roadmap-none">' + esc(msg) + '</div>';
  }
  if(!tl.lanes.length && !tl.unsched.length){
    return section("timeline", "Combined timeline", '<p class="empty">No projects with milestones to plot.</p>', null);
  }

  var body =
    '<div class="legend">' + legend + '</div>' +
    '<div class="roadmap-wrap"><div class="roadmap">' +
    '<div class="lanes-gutter" style="width:' + GUTTER_W + 'px">' + gutter.join("") + '</div>' +
    '<div class="plot-wrap"><div class="plot" style="width:' + PLOT_W + 'px;height:' + tl.plot_h + 'px">' +
    plot.join("") + '</div></div></div>' + unsched + placeholder + '</div>';
  return '<section class="card" data-sec="timeline" data-collapsed="' + collapsedAttr("timeline") + '">' +
    '<button class="sec-head" aria-expanded="' + expandedAria("timeline") + '"><h2>Combined timeline</h2>' +
    '<span class="chev" aria-hidden="true"></span></button>' +
    '<div class="sec-body">' + body + '</section>';
}

/* ------------------------------------------------------------- health strip --- */
function renderHealthStrip(records){
  var rows = records.map(function(pr, i){
    if(!pr.state){
      return '<tr class="pstrip-row pstrip-err"><td colspan="8">' +
        '<div class="pj"><span class="pj-dot"></span><div class="pj-meta">' +
        '<div class="pj-name">' + esc(pr.name) + '</div>' +
        '<div class="pj-sub">Could not load ' + esc(pr.stateFile || pr.folder || "state.json") + ' — ' + esc(pr.error || "unknown error") + '</div>' +
        '</div></div></td></tr>';
    }
    var c = pr.counts;
    var folderSafe = (pr.folder && !EMBEDDED) ? pr.folder.replace(/\/+$/,'').replace(/^\/+/, '') : null;
    // Embedded records may carry an explicit href (builder's `path=href` syntax) so a
    // snapshot hosted next to its dashboards can still link out.
    var linkBase = folderSafe ? ("./" + folderSafe + "/dashboard.aspx") : (pr.href || null);
    var nameCell;
    if(linkBase){
      nameCell = '<a class="pj-name"' + (folderSafe ? ' data-folder="' + esc(folderSafe) + '"' : '') +
        ' href="' + esc(linkBase) + '">' + esc(pr.name) + '</a>';
    } else {
      // No sibling dashboard and no explicit href — name stays unlinked.
      nameCell = '<span class="pj-name">' + esc(pr.name) + '</span>';
    }
    // Requirements/BA cell — compact maturity summary, deep-links into the project's user-stories section.
    var reqCell = (function(){
      var ba = c.ba;
      if(!ba || !ba.stories){ return '<td><span class="req-none">no stories yet</span></td>'; }
      var topTxt = ba.stories + ' ' + (ba.stories === 1 ? "story" : "stories") + ' · ' +
        ba.scenarios + ' ' + plural(ba.scenarios, "scenario");
      var topHtml = linkBase
        ? '<a class="req-link" href="' + esc(linkBase) + '#ba-us-sec" title="Open user stories & RTM">' + esc(topTxt) + '</a>'
        : '<span>' + esc(topTxt) + '</span>';
      var sub;
      if(ba.scenarios === 0){
        sub = '<span class="req-warn">no scenarios yet</span>';
      } else {
        var b = ba.byStatus, parts = [];
        if(b.agreed) parts.push('<span>' + b.agreed + ' agreed</span>');
        var ip = b.implemented + b.passing;
        if(ip) parts.push('<span>' + ip + ' ' + (b.passing ? "passing" : "implemented") + '</span>');
        if(b.draft){
          var draftHeavy = (b.draft / ba.scenarios) > 0.5;
          parts.push('<span' + (draftHeavy ? ' class="req-warn"' : '') + '>' + b.draft + ' draft</span>');
        }
        if(b.failing) parts.push('<span class="req-bad">' + b.failing + ' failing</span>');
        sub = parts.join(' · ');
      }
      return '<td><div class="req-cell"><div class="req-top">' + topHtml + '</div>' +
        '<div class="req-sub">' + sub + '</div></div></td>';
    })();
    var vbadge = "";
    var nerr = pr.validation.errors.length;
    if(nerr){ vbadge = '<span class="vbadge" data-detail="pstrip-detail-' + i + '" role="button" tabindex="0" ' +
      'title="Show validation issues">' + nerr + ' ' + plural(nerr, "issue") + '</span>'; }
    function numCell(n){ return '<td class="num"><span class="big ' + (n ? "" : "zero") + '">' + n + '</span></td>'; }
    function warnCell(n){ return '<td class="num"><span class="big ' + (n ? "warnv" : "zero") + '">' + n + '</span></td>'; }
    var row = '<tr class="pstrip-row">' +
      '<td><div class="pj"><span class="pj-dot" style="background:' + esc(safeColor(pr.color)) + '"></span>' +
      '<div class="pj-meta">' + nameCell + vbadge +
      '<div class="pj-sub">' + esc(pr.client) + '</div></div></div></td>' +
      '<td><span class="hchip verdict-' + pr.healthLevel + '"><span class="verdict-dot"></span>' + esc(pr.verdict) + '</span></td>' +
      numCell(c.openActions) + numCell(c.openRisks) + warnCell(c.openConflicts) + warnCell(c.overdue) +
      reqCell +
      '<td class="pstrip-stamp">' + fmtStamp(pr.state.project && pr.state.project.lastDigest) + '</td></tr>';
    if(nerr){
      row += '<tr class="pstrip-detail" id="pstrip-detail-' + i + '" hidden><td colspan="8">' +
        '<div class="vbanner"><div class="vbanner-h"><span class="vbanner-dot"></span>' +
        nerr + ' validation ' + (nerr === 1 ? "issue" : "issues") + ' in ' + esc(pr.name) + '</div>' +
        '<div class="vbanner-sub">Health and counts above still reflect everything renderable. Fix against <code>schema.json</code>.</div>' +
        '<ul>' + pr.validation.errors.map(function(e){ return '<li>' + esc(e) + '</li>'; }).join("") + '</ul></div></td></tr>';
    }
    return row;
  }).join("");

  return '<section class="card pstrip-card">' +
    '<div class="pstrip-head"><h2>Program health</h2><span class="sub">One row per project' +
    (EMBEDDED ? " · embedded snapshot" : " · click a name to open its dashboard") + '</span></div>' +
    '<div class="pstrip-wrap"><table class="pstrip"><thead><tr>' +
    '<th>Project</th><th>Health</th><th class="num">Open actions</th><th class="num">Open risks</th>' +
    '<th class="num">Open conflicts</th><th class="num">Overdue</th><th>Requirements</th><th>Last digest</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div></section>';
}

/* --------------------------------------------------- cross-project deps --- */
function renderDependencies(records, today){
  var todn = today.getTime() / 86400000;
  var all = [];
  records.forEach(function(pr){
    if(!pr.state) return;
    (pr.state.dependencies || []).forEach(function(d){ all.push({pr:pr, d:d}); });
  });
  var sortRank = {"blocked":0, "open":1, "met":2};
  all.sort(function(a, b){
    var ra = sortRank[a.d.status] === undefined ? 9 : sortRank[a.d.status];
    var rb = sortRank[b.d.status] === undefined ? 9 : sortRank[b.d.status];
    if(ra !== rb) return ra - rb;
    var da = parseDate(a.d.neededBy), db = parseDate(b.d.neededBy);
    return (da ? da.dn : Infinity) - (db ? db.dn : Infinity);
  });
  if(!all.length) return section("dependencies", "Cross-project dependencies", "", 0, "No cross-project dependencies recorded.");
  var rows = all.map(function(x){
    var d = x.d, pr = x.pr;
    var nd = parseDate(d.neededBy);
    var overdue = !!(nd && nd.dn < todn && d.status !== "met");
    var dueCell = overdue
      ? '<td class="num">' + fmtDate(d.neededBy) + ' <span class="badge overdue">Overdue</span></td>'
      : '<td class="num">' + fmtDate(d.neededBy) + '</td>';
    var cls = "pstrip-plain" + (d.status === "blocked" ? " dep-blocked" : "");
    return '<tr class="' + cls + '">' +
      '<td class="pcol"><span class="pj-dot" style="background:' + esc(safeColor(pr.color)) + '"></span>' + esc(pr.name) + '</td>' +
      '<td>' + esc(d.title) + '</td>' +
      '<td>' + esc(d.on || "—") + '</td>' + dueCell +
      '<td><span class="tag tag-dep-' + esc(d.status) + '">' + esc(DEP_STATUS[d.status] || d.status) + '</span></td></tr>';
  }).join("");
  var body = '<table class="grid"><thead><tr><th>Project</th><th>Dependency</th><th>On</th>' +
    '<th class="num">Needed by</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>';
  return section("dependencies", "Cross-project dependencies", body, all.length);
}

/* ------------------------------------------------------- open conflicts --- */
function renderConflicts(records){
  var all = [];
  records.forEach(function(pr){
    if(!pr.state) return;
    var art = {};
    (pr.state.artifacts || []).forEach(function(a){ art[a.id] = a; });
    (pr.state.conflicts || []).filter(function(c){ return c.status === "open"; }).forEach(function(c){ all.push({pr:pr, c:c, art:art}); });
  });
  if(!all.length) return section("conflicts", "Open conflicts", "", 0, "No open conflicts across the program.");
  function srcLine(art, cid){ var a = art[cid]; if(!a) return ""; return esc(a.type) + " · " + fmtDate(a.date); }
  var items = all.map(function(x){
    var c = x.c, pr = x.pr;
    return '<li class="cf-item">' +
      '<div class="cf-proj"><span class="pj-dot" style="background:' + esc(safeColor(pr.color)) + '"></span>' + esc(pr.name) + '</div>' +
      '<div class="cf-about">' + esc(c.about) + '</div>' +
      '<div class="cf-cols">' +
      '<div class="cf-was"><span class="cf-lbl">Was</span>' + esc(c.was) + '<span class="cf-src">' + srcLine(x.art, c.sourceOld) + '</span></div>' +
      '<div class="cf-arrow" aria-hidden="true">→</div>' +
      '<div class="cf-now"><span class="cf-lbl">Now</span>' + esc(c.now) + '<span class="cf-src">' + srcLine(x.art, c.sourceNew) + '</span></div>' +
      '</div></li>';
  }).join("");
  var n = all.length;
  var banner = '<div class="cf-banner">' + n + ' open conflict' + (n !== 1 ? "s" : "") + ' across the program need' + (n === 1 ? "s" : "") + ' review</div>';
  return '<section class="card cf-card" data-sec="conflicts" data-collapsed="' + collapsedAttr("conflicts") + '">' +
    '<button class="sec-head" aria-expanded="' + expandedAria("conflicts") + '"><h2>Open conflicts</h2>' +
    '<span class="count">' + n + '</span><span class="chev" aria-hidden="true"></span></button>' +
    '<div class="sec-body">' + banner + '<ul class="cf-list">' + items + '</ul></div></section>';
}

/* ------------------------------------------ overdue & due-soon actions --- */
function renderActions(records, today){
  var todn = today.getTime() / 86400000;
  var all = [];
  records.forEach(function(pr){
    if(!pr.state) return;
    var stk = {};
    (pr.state.stakeholders || []).forEach(function(s){ stk[s.id] = s.name; });
    (pr.state.actions || []).forEach(function(a){
      if(a.status !== "open" && a.status !== "in-progress") return;
      var d = parseDate(a.due);
      if(!d) return;                                   // no due date -> not overdue/due-soon
      if(d.dn > todn + DUE_SOON_DAYS) return;          // beyond the 14-day window
      all.push({pr:pr, a:a, owner:(a.owner ? (stk[a.owner] !== undefined ? stk[a.owner] : "Unassigned") : "Unassigned"), dn:d.dn});
    });
  });
  all.sort(function(a, b){ return a.dn - b.dn; });
  if(!all.length) return section("actions", "Overdue & due-soon actions", "", 0, "Nothing overdue or due within 14 days.");
  var rows = all.map(function(x){
    var a = x.a, pr = x.pr;
    var overdue = x.dn < todn;
    var tag = overdue ? ' <span class="badge overdue">Overdue</span>' : "";
    var cls = overdue ? "row-overdue" : "";
    return '<tr class="' + cls + '">' +
      '<td class="pcol"><span class="pj-dot" style="background:' + esc(safeColor(pr.color)) + '"></span>' + esc(pr.name) + '</td>' +
      '<td>' + esc(a.title) + tag + '</td>' +
      '<td>' + esc(x.owner) + '</td>' +
      '<td class="num">' + fmtDate(a.due) + '</td>' +
      '<td><span class="tag tag-act-' + esc(a.status) + '">' + esc(ACT_STATUS[a.status] || a.status) + '</span></td></tr>';
  }).join("");
  var body = '<table class="grid"><thead><tr><th>Project</th><th>Action</th><th>Owner</th>' +
    '<th class="num">Due</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>';
  return section("actions", "Overdue & due-soon actions", body, all.length);
}

/* --------------------------------------------------------------- header --- */
var WORST = {"good":0, "warning":1, "critical":2};
var WORST_VERDICT = {0:["good","On track"], 1:["warning","Needs attention"], 2:["critical","Off track"]};
function renderHeader(records, programName){
  var loaded = records.filter(function(pr){ return pr.state; });
  var errored = records.length - loaded.length;
  var sum = {actions:0, risks:0, conflicts:0, overdue:0};
  var worst = -1;
  loaded.forEach(function(pr){
    sum.actions += pr.counts.openActions; sum.risks += pr.counts.openRisks;
    sum.conflicts += pr.counts.openConflicts; sum.overdue += pr.counts.overdue;
    var w = WORST[pr.healthLevel]; if(w > worst) worst = w;
  });
  var level, verdict;
  if(worst < 0){ level = "warning"; verdict = "No data"; }
  else { var v = WORST_VERDICT[worst]; level = v[0]; verdict = v[1]; }

  var stats = [];
  function stat(n, label, warn){ stats.push('<div class="stat' + (warn && n ? " stat-warn" : "") + '"><span class="stat-n">' + n + '</span><span class="stat-l">' + esc(label) + '</span></div>'); }
  stat(records.length, plural(records.length, "Project"));
  stat(sum.actions, plural(sum.actions, "Open action"));
  stat(sum.risks, plural(sum.risks, "Open risk"));
  stat(sum.conflicts, plural(sum.conflicts, "Open conflict"), true);
  stat(sum.overdue, plural(sum.overdue, "Overdue action"), true);
  if(errored) stat(errored, plural(errored, "Project") + " unreadable", true);

  var total = ALL_RECORDS.length;
  var sel = records.length;
  var subtitle = (sel < total)
    ? ('Program rollup · showing ' + sel + ' of ' + total + ' ' + plural(total, "project"))
    : ('Program rollup · ' + loaded.length + ' of ' + records.length + ' ' + plural(records.length, "project") + ' loaded');
  return '<header class="head">' +
    '<div class="head-main"><div class="head-id">' +
    '<h1>' + esc(programName) + '</h1>' +
    '<div class="head-sub">' + subtitle + '</div></div>' +
    '<div class="verdict verdict-' + level + '"><span class="verdict-dot"></span>' +
    '<div class="verdict-txt"><span class="verdict-lbl">Worst-of health</span>' +
    '<span class="verdict-val">' + esc(verdict) + '</span></div></div></div>' +
    '<div class="stats">' + stats.join("") + '</div></header>';
}

/* ========================================================================== */
/*  ASSEMBLE + WIRE                                                            */
/* ========================================================================== */
var PROGRAM_NAME = "Program rollup";

/* ---- project picker: keep ALL loaded records, filter the view by a selected set --- */
var ALL_RECORDS = [];   // every loaded record (decorated once), regardless of selection
var META = null;        // {loadedAt}
var SELECTED = {};       // selId -> true for projects currently shown

/* Stable per-project identity for selection/persistence. Loaded projects key on
   state.project.id (what gets persisted); unreadable records fall back to their
   file/folder so they can still be toggled out of the view. */
function selId(pr){
  if(pr.state && pr.state.project && pr.state.project.id != null && pr.state.project.id !== "")
    return String(pr.state.project.id);
  return "file:" + String(pr.stateFile || pr.folder || pr.name || "?");
}
function selectedCount(){
  var n = 0; for(var k in SELECTED){ if(SELECTED[k]) n++; } return n;
}
function selectedRecords(){
  return ALL_RECORDS.filter(function(pr){ return SELECTED[selId(pr)]; });
}
function loadSelection(records){
  var ids = records.map(selId), sel = {}, stored = null;
  try { var raw = localStorage.getItem("aipm-program-selection"); if(raw) stored = JSON.parse(raw); } catch(e){}
  if(Array.isArray(stored)){
    stored.forEach(function(id){ if(ids.indexOf(String(id)) !== -1) sel[String(id)] = true; });
  }
  // No persisted selection, or every stored id is stale -> show all (never empty).
  if(Object.keys(sel).length === 0){ ids.forEach(function(id){ sel[id] = true; }); }
  return sel;
}
function saveSelection(){
  try {
    var arr = ALL_RECORDS.filter(function(pr){ return SELECTED[selId(pr)]; }).map(selId);
    localStorage.setItem("aipm-program-selection", JSON.stringify(arr));
  } catch(e){}
}
function renderPicker(){
  if(ALL_RECORDS.length < 2) return "";   // nothing to pick between
  var chips = ALL_RECORDS.map(function(pr){
    var id = selId(pr), on = !!SELECTED[id];
    return '<button type="button" class="pj-chip" data-sel-id="' + esc(id) + '" ' +
      'aria-pressed="' + (on ? "true" : "false") + '" ' +
      'title="' + esc((on ? "Hide " : "Show ") + pr.name) + '">' +
      '<span class="pj-chip-dot" style="background:' + esc(safeColor(pr.color)) + '"></span>' +
      '<span class="pj-chip-name">' + esc(pr.name) + '</span>' +
      '<span class="pj-chip-check" aria-hidden="true">✓</span></button>';
  }).join("");
  return '<div class="picker" role="group" aria-label="Show or hide projects">' +
    '<span class="picker-lbl">Projects</span>' + chips + '</div>';
}

/* Entry point from the loaders — store everything once, then render the view. */
function renderProgram(records, meta){
  ALL_RECORDS = records || [];
  META = meta || {loadedAt: nowStr()};
  decorate(ALL_RECORDS, todayUTC());       // color/health/counts/name — assigned once, stable
  SELECTED = loadSelection(ALL_RECORDS);
  renderView(false);
}

/* Rebuild the whole rollup over the currently-selected records. */
function renderView(keepScroll){
  var scrollY = keepScroll ? window.scrollY : 0;
  var today = todayUTC();
  EXPANDED = loadSections();
  var records = selectedRecords();

  var parts = [];
  parts.push(renderHeader(records, PROGRAM_NAME));
  parts.push('<div class="filters tools-bar" role="group" aria-label="View controls">' +
    renderPicker() +
    '<div class="filter-tools">' +
    '<button class="tool-btn" id="expand-all" type="button">Expand all</button>' +
    '<button class="tool-btn" id="collapse-all" type="button">Collapse all</button>' +
    '<button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light or dark theme"></button>' +
    '</div></div>');
  parts.push(renderHealthStrip(records));
  parts.push(renderTimeline(buildProgramTimeline(records, today)));
  parts.push(renderDependencies(records, today));
  parts.push(renderConflicts(records));
  parts.push(renderActions(records, today));

  var files = ALL_RECORDS.map(function(pr){ return esc(pr.stateFile || (pr.folder ? pr.folder + "/state.json" : pr.name)); }).join(" · ");
  parts.push(
    '<div class="foot">Rendered ' + fmtDate(today.toISOString().slice(0,10)) + ' · AI PM v4.13 program rollup · states validated against schema.json' +
    '<div class="foot-priv">Rendered in your browser — data never leaves this page · loaded ' + esc(META.loadedAt) + '</div>' +
    '<div class="foot-files">State files: ' + files + '</div>' +
    '<div><button class="reload-link" id="reload-btn" type="button">Load different projects</button></div></div>');

  document.title = PROGRAM_NAME + " — Program rollup";
  closePop();
  app.innerHTML = '<div class="wrap">' + parts.join("\n") + '</div>';
  wireInteractivity();
  probeDashboards();
  window.scrollTo(0, keepScroll ? scrollY : 0);
}

function wireInteractivity(){
  document.querySelectorAll(".sec-head").forEach(function(h){
    h.addEventListener("click", function(){
      var card = h.closest(".card");
      var col = card.getAttribute("data-collapsed") === "true";
      card.setAttribute("data-collapsed", col ? "false" : "true");
      h.setAttribute("aria-expanded", col ? "true" : "false");
      saveSections();
    });
  });
  function setAll(collapsed){
    document.querySelectorAll(".card[data-sec]").forEach(function(c){
      c.setAttribute("data-collapsed", collapsed ? "true" : "false");
      var h = c.querySelector(".sec-head");
      if(h) h.setAttribute("aria-expanded", collapsed ? "false" : "true");
    });
    saveSections();
  }
  var ea = document.getElementById("expand-all"), ca = document.getElementById("collapse-all");
  if(ea) ea.addEventListener("click", function(){ setAll(false); });
  if(ca) ca.addEventListener("click", function(){ setAll(true); });

  var tt = document.getElementById("theme-toggle");
  if(tt){ updateThemeIcon(); tt.addEventListener("click", function(){ setTheme(activeTheme() === "dark" ? "light" : "dark"); }); }

  // validation detail toggles (amber badge in the health strip)
  function toggleDetail(badge){
    var id = badge.getAttribute("data-detail");
    var row = document.getElementById(id);
    if(row) row.hidden = !row.hidden;
  }
  document.querySelectorAll(".vbadge").forEach(function(b){
    b.addEventListener("click", function(e){ e.preventDefault(); e.stopPropagation(); toggleDetail(b); });
    b.addEventListener("keydown", function(e){ if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggleDetail(b); } });
  });

  var rb = document.getElementById("reload-btn");
  if(rb) rb.addEventListener("click", function(){ showDropZone(null); });

  // milestone pills — open the detail/provenance card (buttons: Enter/Space fire click natively)
  document.querySelectorAll(".pill[data-mspop]").forEach(function(p){
    p.addEventListener("click", function(e){ e.stopPropagation(); openMsPop(p, e.clientX, e.clientY); });
  });

  // project picker — toggle a project in/out of the whole rollup (min one stays on)
  function shakeChip(chip){
    chip.classList.remove("shake"); void chip.offsetWidth; chip.classList.add("shake");
    setTimeout(function(){ chip.classList.remove("shake"); }, 420);
  }
  document.querySelectorAll(".pj-chip").forEach(function(chip){
    chip.addEventListener("click", function(){
      var id = chip.getAttribute("data-sel-id");
      if(SELECTED[id]){
        if(selectedCount() <= 1){ shakeChip(chip); return; }  // refuse to empty the view
        delete SELECTED[id];
      } else {
        SELECTED[id] = true;
      }
      saveSelection();
      renderView(true);   // recompute everything over the new selection, keep scroll
    });
  });
}

/* Dashboard link: default to <folder>/dashboard.aspx; if that 404s, fall back
   to <folder>/dashboard.html. Same-origin HEAD probe only (no external calls). */
function probeDashboards(){
  document.querySelectorAll("a.pj-name[data-folder]").forEach(function(a){
    var folder = (a.getAttribute("data-folder") || "").replace(/^\/+/, '');
    if(!folder) return;
    function fallback(){
      a.href = "./" + folder + "/dashboard.html";
      // keep the Requirements deep-link in the same row consistent
      var row = a.closest("tr");
      var rl = row && row.querySelector("a.req-link");
      if(rl) rl.href = rl.href.replace("/dashboard.aspx#", "/dashboard.html#");
    }
    fetch("./" + folder + "/dashboard.aspx", {method:"HEAD"}).then(function(r){
      if(!r.ok) fallback();
    }).catch(fallback);
  });
}

/* ========================================================================== */
/*  LOADING                                                                    */
/* ========================================================================== */
/* Embedded mode: state objects are carried inline (no fetches). Each entry is
   {folder, title, state}. Records are built directly and validated/rendered by the
   SAME pipeline as fetched/dropped states. */
function loadEmbedded(cfg){
  EMBEDDED = true;
  PROGRAM_NAME = (cfg && cfg.name) || "Program rollup";
  var entries = (cfg && cfg.projects) || [];
  if(!entries.length){ showDropZone("The embedded program block lists no projects. Drop your state.json files below."); return; }
  var records = entries.map(function(e){
    e = e || {};
    var folder = e.folder ? String(e.folder).replace(/\/+$/,"") : null;
    var stateFile = folder ? folder + "/state.json" : null;
    if(e.state === null || e.state === undefined){
      return {folder:folder, title:e.title || null, error:"No embedded state provided for this project", stateFile:stateFile};
    }
    return {folder:folder, title:e.title || null, state:e.state, stateFile:stateFile, href:e.href || null};
  });
  renderProgram(records, {loadedAt: nowStr()});
}

function loadProgram(cfg){
  PROGRAM_NAME = (cfg && cfg.name) || "Program rollup";
  var entries = (cfg && cfg.projects) || [];
  if(!entries.length){ showDropZone("program.json lists no projects. Drop your state.json files below."); return; }
  Promise.all(entries.map(function(e){
    var folder = String(e.folder || "").replace(/\/$/,"");
    var url = folder + "/state.json";
    return fetch(url).then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then(function(text){
        var state; try { state = JSON.parse(text); }
        catch(pe){ return {folder:folder, title:e.title || null, error:"Invalid JSON: " + (pe && pe.message ? pe.message : pe), stateFile:url}; }
        return {folder:folder, title:e.title || null, state:state, stateFile:url};
      })
      .catch(function(err){ return {folder:folder, title:e.title || null, error:(err && err.message ? err.message : String(err)), stateFile:url}; });
  })).then(function(records){ renderProgram(records, {loadedAt: nowStr()}); });
}

function readFiles(fileList){
  var arr = Array.prototype.slice.call(fileList);
  if(!arr.length) return;
  Promise.all(arr.map(readOneFile)).then(function(records){
    var loaded = records.filter(function(r){ return r.state; }).length;
    PROGRAM_NAME = "Program rollup (" + loaded + " " + plural(loaded, "project") + ")";
    renderProgram(records, {loadedAt: nowStr()});
  });
}
function readOneFile(file){
  return new Promise(function(resolve){
    var reader = new FileReader();
    reader.onload = function(){
      var state; try { state = JSON.parse(String(reader.result)); }
      catch(e){ resolve({folder:null, title:null, error:"Invalid JSON: " + (e && e.message ? e.message : e), stateFile:file.name}); return; }
      resolve({folder:null, title:null, state:state, stateFile:file.name});
    };
    reader.onerror = function(){ resolve({folder:null, title:null, error:"Could not read file", stateFile:file.name}); };
    reader.readAsText(file);
  });
}

function showDropZone(errMsg){
  document.title = "AI PM — Program rollup";
  var icon = '<div class="dz-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M12 16V4M12 4l-4 4M12 4l4 4"></path>' +
    '<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path></svg></div>';
  app.innerHTML =
    '<div class="centre"><div class="dropzone" id="dropzone">' + icon +
    '<div class="dz-title">Drop your projects’ state.json files here</div>' +
    '<div class="dz-sub">Select or drag <strong>several</strong> state.json files at once — one per project. ' +
    'Everything renders locally in your browser; your data is never uploaded or sent anywhere.</div>' +
    '<div class="dz-actions"><button class="dz-btn" id="dz-pick" type="button">Choose files…</button>' +
    '<input type="file" id="dz-file" class="dz-input" accept=".json,application/json" multiple></div>' +
    (errMsg ? '<div class="dz-err">' + esc(errMsg) + '</div>' : '') +
    '<div class="dz-note">Tip: on a network share, add <code>?projects=folder-a,folder-b</code> to the URL, ' +
    'or place a <code>program.json</code> next to this page.</div>' +
    '</div></div>';

  var zone = document.getElementById("dropzone");
  var input = document.getElementById("dz-file");
  var pick = document.getElementById("dz-pick");
  pick.addEventListener("click", function(){ input.click(); });
  input.addEventListener("change", function(){ if(input.files && input.files.length) readFiles(input.files); });
  ["dragenter","dragover"].forEach(function(ev){
    zone.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.add("drag"); });
  });
  ["dragleave","dragend"].forEach(function(ev){
    zone.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.remove("drag"); });
  });
  zone.addEventListener("drop", function(e){
    e.preventDefault(); e.stopPropagation(); zone.classList.remove("drag");
    var fs = e.dataTransfer && e.dataTransfer.files;
    if(fs && fs.length) readFiles(fs);
  });
  document.addEventListener("dragover", preventNav);
  document.addEventListener("drop", preventNav);
}
function preventNav(e){ e.preventDefault(); }

/* ---- boot: embedded block -> ?projects= -> program.json -> multi-file drop zone ---- */
function boot(){
  // 1) Embedded data (self-contained snapshot). Takes precedence when non-empty.
  var emb = document.getElementById("embedded-program");
  if(emb){
    var raw = (emb.textContent || "");
    if(raw.trim()){
      var ecfg;
      try { ecfg = JSON.parse(raw); }
      catch(e){ showDropZone("The embedded program data is not valid JSON (" + (e && e.message ? e.message : e) + "). Drop your state.json files below."); return; }
      loadEmbedded(ecfg);
      return;
    }
  }

  var qs = new URLSearchParams(window.location.search);
  var pj = qs.get("projects");
  if(pj){
    var folders = pj.split(",").map(function(s){ return s.trim(); }).filter(Boolean)
      .filter(function(f){ return !/^([a-z]+:)?\/\//i.test(f); });
    if(folders.length){
      loadProgram({name: qs.get("name") || "Program rollup", projects: folders.map(function(f){ return {folder:f, title:null}; })});
      return;
    }
  }
  fetch("program.json").then(function(r){ if(!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(function(text){
      var cfg; try { cfg = JSON.parse(text); }
      catch(e){ showDropZone("program.json is not valid JSON (" + (e && e.message ? e.message : e) + "). Drop your state.json files below."); return; }
      loadProgram(cfg);
    })
    .catch(function(){ showDropZone(null); });
}
boot();
})();
</script>
